# Prometheus Configuration - HallyuHub
# =====================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'hallyuhub'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # ============================================
  # Prometheus - Auto-monitoramento
  # ============================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          environment: 'monitoring'

  # ============================================
  # Node Exporter - Metricas do Sistema
  # ============================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          environment: 'server'

  # ============================================
  # cAdvisor - Metricas de Containers
  # ============================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          environment: 'docker'

  # ============================================
  # HallyuHub - Metricas da Aplicacao (Production)
  # ============================================
  - job_name: 'hallyuhub-production'
    metrics_path: '/api/metrics'
    scheme: https
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/prometheus_token
    static_configs:
      - targets: ['www.hallyuhub.com.br']
        labels:
          environment: 'production'
          app: 'hallyuhub'
          service: 'web'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'production'

  # ============================================
  # Blackbox - Disponibilidade externa (Production)
  # ============================================
  - job_name: 'blackbox-hallyuhub-prod'
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets:
          - https://www.hallyuhub.com.br/api/health
        labels:
          environment: 'production'
          service: 'web'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ============================================
  # Blackbox - Disponibilidade externa (Staging)
  # ============================================
  - job_name: 'blackbox-hallyuhub-staging'
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets:
          - https://staging.hallyuhub.com.br/api/health
        labels:
          environment: 'staging'
          service: 'web'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ============================================
  # PostgreSQL (se usar postgres_exporter)
  # ============================================
  # - job_name: 'postgresql'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
  #       labels:
  #         environment: 'database'
