global:
  resolve_timeout: 5m

route:
  receiver: slack-default
  group_by: [alertname, service, environment]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - receiver: slack-critical
      matchers:
        - severity="critical"
      continue: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: [alertname, service, environment]

receivers:
  - name: slack-default
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_DEPLOYS}"
        channel: "#deploy"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        text: >-
          *Service:* {{ .CommonLabels.service }}\n
          *Environment:* {{ .CommonLabels.environment }}\n
          *Severity:* {{ .CommonLabels.severity }}\n
          {{ range .Alerts }}*Summary:* {{ .Annotations.summary }}\n*Description:* {{ .Annotations.description }}{{ end }}

  - name: slack-critical
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_DEPLOYS}"
        channel: "#deploy"
        send_resolved: true
        title: ":rotating_light: [CRITICAL] {{ .CommonLabels.alertname }}"
        text: >-
          *Service:* {{ .CommonLabels.service }}\n
          *Environment:* {{ .CommonLabels.environment }}\n
          {{ range .Alerts }}*Summary:* {{ .Annotations.summary }}\n*Description:* {{ .Annotations.description }}{{ end }}
