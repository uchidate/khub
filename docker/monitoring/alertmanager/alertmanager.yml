global:
  resolve_timeout: 5m

route:
  receiver: slack-default
  group_by: [alertname, service, environment]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - receiver: slack-silent
      matchers:
        - severity="none"
    - receiver: slack-critical
      matchers:
        - severity="critical"
      continue: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: [alertname, service, environment]

receivers:
  - name: slack-silent
    slack_configs: []

  - name: slack-default
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_DEPLOYS}"
        channel: "#deploy"
        send_resolved: true
        title: >-
          {{ if eq .Status "firing" }}
          {{- if eq .CommonLabels.severity "warning" }}:warning:{{ else }}:bell:{{ end }}
          {{- else }}:white_check_mark:{{ end }}
          {{ if eq .Status "resolved" }}Resolvido{{ else }}Alerta{{ end }} —
          {{- range .Alerts }}{{ .Annotations.summary }}{{ end }}
        text: >-
          {{ range .Alerts }}
          {{ if eq $.Status "resolved" }}_O problema foi resolvido automaticamente._{{ else }}
          *O que aconteceu:* {{ .Annotations.description }}
          *Serviço:* {{ $.CommonLabels.service }} | *Ambiente:* {{ $.CommonLabels.environment }} | *Severidade:* {{ $.CommonLabels.severity }}
          {{ end }}
          {{ end }}
        color: '{{ if eq .Status "resolved" }}good{{ else if eq .CommonLabels.severity "critical" }}danger{{ else }}warning{{ end }}'

  - name: slack-critical
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_DEPLOYS}"
        channel: "#deploy"
        send_resolved: true
        title: >-
          {{ if eq .Status "resolved" }}:white_check_mark: Resolvido{{ else }}:rotating_light: CRÍTICO{{ end }} —
          {{- range .Alerts }}{{ .Annotations.summary }}{{ end }}
        text: >-
          {{ range .Alerts }}
          {{ if eq $.Status "resolved" }}_Problema crítico resolvido automaticamente._{{ else }}
          *O que aconteceu:* {{ .Annotations.description }}
          *Serviço:* {{ $.CommonLabels.service }} | *Ambiente:* {{ $.CommonLabels.environment }}
          *Ação recomendada:* Verifique os logs em https://www.hallyuhub.com.br
          {{ end }}
          {{ end }}
        color: '{{ if eq .Status "resolved" }}good{{ else }}danger{{ end }}'
