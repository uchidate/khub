# Upstream: nginx roda no HOST, conecta na porta mapeada do container Docker
upstream hallyuhub_staging_backend {
    server 127.0.0.1:3001;
    keepalive 32;
    keepalive_requests 1000;  # Reutiliza conexões keepalive antes de fechar
    keepalive_timeout 65s;    # Mantém conexão idle por 65s
}

# Log JSON para erros de gateway
log_format gateway_errors_staging escape=json
    '{"ts":"$time_iso8601",'
     '"status":$status,'
     '"method":"$request_method",'
     '"path":"$request_uri",'
     '"duration":$request_time,'
     '"ip":"$remote_addr",'
     '"ua":"$http_user_agent"}';

map $status $log_gateway_error_staging {
    502 1;
    503 1;
    504 1;
    default 0;
}

map $http_upgrade $connection_upgrade_staging {
    default "upgrade";
    ""      "";
}

server {
    listen 80;
    server_name staging.hallyuhub.com.br;

    # Limites do cliente
    client_max_body_size 10m;          # Permite uploads de imagens/arquivos
    large_client_header_buffers 4 16k; # Next.js com cookies/auth envia headers grandes

    proxy_connect_timeout   5s;
    proxy_send_timeout     60s;
    proxy_read_timeout    120s;

    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;

    # Gzip: reduz tamanho de HTML/JS/CSS/JSON em ~70-80%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    access_log /var/log/nginx/gateway-errors-staging.log gateway_errors_staging if=$log_gateway_error_staging;

    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        root /etc/nginx/html;
        internal;
        add_header Content-Type "text/html; charset=utf-8";
        add_header Cache-Control "no-cache, no-store";
        add_header Retry-After "30";
    }

    location / {
        proxy_pass         http://hallyuhub_staging_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade_staging;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 1;

        # Security headers (sem HSTS — staging usa HTTP)
        add_header X-Content-Type-Options "nosniff"                           always;
        add_header X-Frame-Options        "SAMEORIGIN"                        always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;
    }
}
