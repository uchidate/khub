# Upstream com keepalive — reutiliza conexões TCP com o Next.js
upstream nextjs {
    server web:3000;
    keepalive 32;
}

# Log JSON para erros de gateway (502/504) — lido pelo painel admin
log_format gateway_errors escape=json
    '{"ts":"$time_iso8601",'
     '"status":$status,'
     '"method":"$request_method",'
     '"path":"$request_uri",'
     '"duration":$request_time,'
     '"ip":"$remote_addr",'
     '"ua":"$http_user_agent"}';

map $status $log_gateway_error {
    502 1;
    504 1;
    default 0;
}

# Mapeia o header Upgrade para suportar WebSocket E keepalive HTTP
map $http_upgrade $connection_upgrade {
    default "upgrade";
    ""      "";
}

server {
    listen 80;
    server_name staging.hallyuhub.com.br;

    # Timeouts de proxy
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;
    proxy_read_timeout    120s;

    # Buffering
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;

    access_log /var/log/nginx/gateway-errors.log gateway_errors if=$log_gateway_error;

    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;

        # WebSocket + keepalive
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }
}
