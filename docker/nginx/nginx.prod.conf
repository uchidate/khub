# Upstream com keepalive — reutiliza conexões TCP com o Next.js (evita overhead de handshake)
upstream nextjs {
    server web:3000;
    keepalive 64;
}

# Log JSON para erros de gateway (502/504) — lido pelo painel admin
log_format gateway_errors escape=json
    '{"ts":"$time_iso8601",'
     '"status":$status,'
     '"method":"$request_method",'
     '"path":"$request_uri",'
     '"duration":$request_time,'
     '"ip":"$remote_addr",'
     '"ua":"$http_user_agent"}';

map $status $log_gateway_error {
    502 1;
    504 1;
    default 0;
}

# Mapeia o header Upgrade para suportar WebSocket E keepalive HTTP
# Se há upgrade (WebSocket): Connection: "upgrade"
# Se não há upgrade (HTTP normal): Connection: "" → upstream usa keepalive pool
map $http_upgrade $connection_upgrade {
    default "upgrade";
    ""      "";
}

server {
    listen 80;
    server_name www.hallyuhub.com.br hallyuhub.com.br;

    # Timeouts de proxy — sem isso o nginx usa padrão de 60s e retorna 502
    # em qualquer resposta que demore mais do que isso
    proxy_connect_timeout  10s;   # Tempo para estabelecer conexão com upstream
    proxy_send_timeout     60s;   # Tempo para enviar request ao upstream
    proxy_read_timeout    120s;   # Tempo para receber resposta do upstream

    # Buffering — evita 502 se o app estiver temporariamente lento
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;

    access_log /var/log/nginx/gateway-errors.log gateway_errors if=$log_gateway_error;

    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;

        # WebSocket + keepalive (usando o map acima)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }
}
