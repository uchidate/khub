# Upstream: nginx roda no HOST, conecta na porta mapeada do container Docker
upstream hallyuhub_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Log JSON para erros de gateway (502/503/504) — lido pelo painel admin
log_format gateway_errors escape=json
    '{"ts":"$time_iso8601",'
     '"status":$status,'
     '"method":"$request_method",'
     '"path":"$request_uri",'
     '"duration":$request_time,'
     '"ip":"$remote_addr",'
     '"ua":"$http_user_agent"}';

map $status $log_gateway_error {
    502 1;
    503 1;
    504 1;
    default 0;
}

# Mapeia o header Upgrade para suportar WebSocket E keepalive HTTP
map $http_upgrade $connection_upgrade {
    default "upgrade";
    ""      "";
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name www.hallyuhub.com.br hallyuhub.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    server_name www.hallyuhub.com.br hallyuhub.com.br;

    ssl_certificate /etc/letsencrypt/live/hallyuhub.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hallyuhub.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Timeouts: connect curto (5s) para falhar rápido e mostrar página de manutenção
    proxy_connect_timeout   5s;
    proxy_send_timeout     60s;
    proxy_read_timeout    120s;

    # Buffering: ON permite que nginx continue recebendo resposta mesmo com cliente lento
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;

    access_log /var/log/nginx/gateway-errors.log gateway_errors if=$log_gateway_error;

    # Página de manutenção servida pelo nginx quando o app está down
    # Evita 502 bruto — usuário vê mensagem amigável durante reinício do container (~30s)
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        root /etc/nginx/html;
        internal;
        add_header Content-Type "text/html; charset=utf-8";
        add_header Cache-Control "no-cache, no-store";
        add_header Retry-After "30";
    }

    location / {
        proxy_pass         http://hallyuhub_backend;
        proxy_http_version 1.1;

        # WebSocket + keepalive
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_cache_bypass $http_upgrade;

        # Não tentar novamente — mostra maintenance.html imediatamente em caso de erro
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 1;
    }
}
