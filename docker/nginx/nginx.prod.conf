# Upstream: nginx roda no HOST, conecta na porta mapeada do container Docker
upstream hallyuhub_backend {
    server 127.0.0.1:3000;
    keepalive 64;
    keepalive_requests 1000;  # Reutiliza conexões keepalive antes de fechar
    keepalive_timeout 65s;    # Mantém conexão idle por 65s
}

# Log JSON para erros de gateway (502/503/504) — lido pelo painel admin
log_format gateway_errors escape=json
    '{"ts":"$time_iso8601",'
     '"status":$status,'
     '"method":"$request_method",'
     '"path":"$request_uri",'
     '"duration":$request_time,'
     '"ip":"$remote_addr",'
     '"ua":"$http_user_agent"}';

map $status $log_gateway_error {
    502 1;
    503 1;
    504 1;
    default 0;
}

# Mapeia o header Upgrade para suportar WebSocket E keepalive HTTP
map $http_upgrade $connection_upgrade {
    default "upgrade";
    ""      "";
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name www.hallyuhub.com.br hallyuhub.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2 ipv6only=on;
    server_name www.hallyuhub.com.br hallyuhub.com.br;

    ssl_certificate /etc/letsencrypt/live/hallyuhub.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hallyuhub.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # SSL session cache: evita renegociação TLS a cada request (especialmente mobile)
    ssl_session_cache shared:SSL:10m;  # ~40k sessões
    ssl_session_timeout 10m;
    ssl_session_tickets off;           # Segurança: desabilita session tickets (PFS)

    # Limites do cliente
    client_max_body_size 10m;          # Permite uploads de imagens/arquivos
    large_client_header_buffers 4 16k; # Next.js com cookies/auth envia headers grandes

    # Timeouts: connect curto (5s) para falhar rápido e mostrar página de manutenção
    proxy_connect_timeout   5s;
    proxy_send_timeout     60s;
    proxy_read_timeout    120s;

    # Buffering: ON permite que nginx continue recebendo resposta mesmo com cliente lento
    proxy_buffering         on;
    proxy_buffer_size       16k;
    proxy_buffers           8 16k;
    proxy_busy_buffers_size 32k;

    # Gzip: reduz tamanho de HTML/JS/CSS/JSON em ~70-80%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml;

    access_log /var/log/nginx/gateway-errors.log gateway_errors if=$log_gateway_error;

    # Página de manutenção servida pelo nginx quando o app está down
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        root /etc/nginx/html;
        internal;
        add_header Content-Type "text/html; charset=utf-8";
        add_header Cache-Control "no-cache, no-store";
        add_header Retry-After "30";
    }

    location / {
        proxy_pass         http://hallyuhub_backend;
        proxy_http_version 1.1;

        # WebSocket + keepalive
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_cache_bypass $http_upgrade;

        # Não tentar novamente — mostra maintenance.html imediatamente em caso de erro
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 1;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    }
}
