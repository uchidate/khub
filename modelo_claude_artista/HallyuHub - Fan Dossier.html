<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HallyuHub — Fan Dossier · Kim Soo-hyun</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800;900&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,300;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  body { font-family: "Schibsted Grotesk", system-ui, sans-serif; color: #0a0a0a; }
  * { box-sizing: border-box; }
  .ha-site { max-width: 1440px; margin: 0 auto; background: #fff; box-shadow: 0 0 0 1px #eee; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="variation-a.jsx"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#ee2244",
  "dark": false
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const themeVars = {
    '--ha-accent': t.accent,
    '--ha-bg': t.dark ? '#0a0a0a' : '#ffffff',
    '--ha-fg': t.dark ? '#f5f5f5' : '#0a0a0a',
  };

  return (
    <React.Fragment>
      <div className="ha-site" style={themeVars} data-screen-label="Fan Dossier · Kim Soo-hyun">
        <VariationA />
      </div>

      <TweaksPanel>
        <TweakSection label="Tema" />
        <TweakColor
          label="Acento"
          value={t.accent}
          options={['#ee2244', '#000000', '#d4a76a', '#2a6fdb']}
          onChange={(v) => setTweak('accent', v)}
        />
        <TweakToggle
          label="Modo escuro"
          value={t.dark}
          onChange={(v) => setTweak('dark', v)}
        />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
