name: Coolify Deploy + Smoke Test
description: Dispara deploy no Coolify local do runner self-hosted e aguarda health check

inputs:
  coolify_uuid:
    description: "UUID da aplicação no Coolify"
    required: true
  coolify_token:
    description: "Token de API do Coolify"
    required: true
  health_url:
    description: "URL do health check (ex: https://staging.hallyuhub.com.br/api/health)"
    required: true
  resolve:
    description: "Argumento --resolve para curl (ex: staging.hallyuhub.com.br:443:31.97.255.107)"
    required: true
  max_wait_seconds:
    description: "Tempo máximo de espera em segundos"
    default: '180'
  force:
    description: "Forçar deploy no Coolify"
    default: 'true'

runs:
  using: composite
  steps:
    - name: 🚀 Trigger Coolify Deploy
      shell: bash
      env:
        UUID: ${{ inputs.coolify_uuid }}
        TOKEN: ${{ inputs.coolify_token }}
        FORCE: ${{ inputs.force }}
      run: |
        UUID=$(echo "$UUID" | tr -d '[:space:]')
        if [ -z "$UUID" ]; then
          echo "❌ Coolify UUID vazio"
          exit 1
        fi
        if [ -z "$TOKEN" ]; then
          echo "❌ Coolify token vazio"
          exit 1
        fi

        echo "Triggering deploy (uuid: $UUID)..."
        RESPONSE=$(curl -s -w '\n%{http_code}' -X GET \
          --connect-timeout 10 --max-time 30 \
          "http://localhost:8000/api/v1/deploy?uuid=${UUID}&force=${FORCE}" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H 'Content-Type: application/json' \
          2>/dev/null || printf '\n000')
        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | sed '$d' | head -c 1000)
        echo "Response: $BODY"
        if ! [[ "$HTTP_CODE" =~ ^[0-9]+$ ]] || [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
          echo "❌ Coolify deploy trigger failed (HTTP $HTTP_CODE)"
          exit 1
        fi
        echo "✅ Deploy triggered (HTTP $HTTP_CODE)"

    - name: 🔍 Smoke Test
      shell: bash
      env:
        HEALTH_URL: ${{ inputs.health_url }}
        RESOLVE: ${{ inputs.resolve }}
        MAX_WAIT: ${{ inputs.max_wait_seconds }}
      run: |
        ITERATIONS=$(( (MAX_WAIT + 9) / 10 ))
        if [ "$ITERATIONS" -lt 1 ]; then ITERATIONS=1; fi
        echo "Aguardando container subir (máx ${MAX_WAIT}s)..."
        for i in $(seq 1 "$ITERATIONS"); do
          sleep 10
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            --resolve "$RESOLVE" "$HEALTH_URL" 2>/dev/null || echo "000")
          if [ "$HTTP" = "200" ]; then
            echo "✅ Health check OK após $((i * 10))s"
            exit 0
          fi
          echo "⏳ Tentativa $i/$ITERATIONS: HTTP $HTTP"
        done
        echo "❌ App não respondeu após ${MAX_WAIT}s"
        exit 1
