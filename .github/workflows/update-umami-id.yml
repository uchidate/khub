name: 🔧 Update Umami Website ID

on:
  workflow_dispatch:

jobs:
  update-umami:
    name: Update UMAMI_WEBSITE_ID in Coolify
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Update production env vars
        run: |
          NEW_ID="3e0c3beb-fccd-43cb-9a5e-06f1d5580656"
          BASE="http://31.97.255.107:8000/api/v1"
          TOKEN="${{ secrets.COOLIFY_TOKEN }}"
          PROD_UUID="e6h2xvvpu8i2jmzcb3tpzmxo"
          STAGING_UUID="lssyh30tgd0qf2ba38p2f7ex"

          update_env() {
            local UUID=$1
            local ENV_NAME=$2
            local ENV_VALUE=$3

            # Get env var ID
            ENV_ID=$(curl -s --max-time 15 "$BASE/applications/$UUID/envs" \
              -H "Authorization: Bearer $TOKEN" | \
              python3 -c "import sys,json; data=json.load(sys.stdin); \
              envs=data if isinstance(data,list) else data.get('data',[]); \
              match=[e for e in envs if e.get('key')=='$ENV_NAME']; \
              print(match[0]['id'] if match else '')" 2>/dev/null)

            if [ -z "$ENV_ID" ]; then
              echo "⚠️  $ENV_NAME not found in $UUID — skipping"
              return
            fi

            RESP=$(curl -s -w "\n%{http_code}" -X PATCH \
              --max-time 15 \
              "$BASE/applications/$UUID/envs/$ENV_ID" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"value\": \"$ENV_VALUE\"}")
            CODE=$(echo "$RESP" | tail -1)
            echo "$ENV_NAME ($UUID): HTTP $CODE"
          }

          for UUID in "$PROD_UUID" "$STAGING_UUID"; do
            update_env "$UUID" "UMAMI_WEBSITE_ID" "$NEW_ID"
            update_env "$UUID" "NEXT_PUBLIC_UMAMI_WEBSITE_ID" "$NEW_ID"
          done

      - name: Restart production app
        run: |
          curl -s --max-time 30 -X GET \
            "http://31.97.255.107:8000/api/v1/deploy?uuid=e6h2xvvpu8i2jmzcb3tpzmxo&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" | python3 -m json.tool || true
          echo "✅ Production restart triggered"

      - name: Restart staging app
        run: |
          curl -s --max-time 30 -X GET \
            "http://31.97.255.107:8000/api/v1/deploy?uuid=lssyh30tgd0qf2ba38p2f7ex&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" | python3 -m json.tool || true
          echo "✅ Staging restart triggered"
