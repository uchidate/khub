name: ⏰ Cron Jobs

# Chamadas HTTP diretas ao Next.js via curl → /api/cron/<endpoint>
# Nunca usar docker exec — apenas HTTP para evitar OOM.
# Chamadas vão via Cloudflare (DNS normal). CRON_SECRET autentica cada request.
# Cada job tem concurrency group para não sobrepor execuções.

on:
  schedule:
    - cron: '*/5 * * * *'   # publish-scheduled, fetch-news, tag-news
    - cron: '*/15 * * * *'  # fetch-streaming-signals
    - cron: '0 */6 * * *'   # update-trending
    - cron: '0 * * * *'     # sync-discography, sync-cast
    - cron: '0 2 * * *'     # sync-social-links, artist-visibility, digest
    - cron: '0 3 * * *'     # fetch-streaming-shows, import-streaming-unmatched
    - cron: '0 10 * * *'    # sync-groups-discography (diário 10:00 UTC = 07:00 BRT)
    - cron: '0 11 * * *'    # refresh-productions (diário 11:00 UTC = 08:00 BRT)
    - cron: '0 7 * * 0'     # sync-filmography (dom 07:00 UTC = 04:00 BRT)
    - cron: '0 8 * * 0'     # sync-cast resync 90d, backfill-korean-flag, sync-hangul (dom 08:00 UTC)

  workflow_dispatch:
    inputs:
      job:
        description: 'Job a executar manualmente'
        required: true
        type: choice
        options:
          - publish-scheduled
          - fetch-news
          - tag-news
          - update-trending
          - fetch-streaming-signals
          - fetch-streaming-shows
          - import-streaming-unmatched
          - refresh-productions
          - sync-discography
          - sync-cast
          - sync-social-links
          - artist-visibility
          - digest
          - sync-groups-discography
          - sync-filmography
          - backfill-korean-flag
          - sync-hangul
          - sync-cast-resync

env:
  BASE_URL: https://www.hallyuhub.com.br
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── Macro p/ condição de schedule ───────────────────────────────────────────
# Uso: (github.event_name == 'schedule' && github.event.schedule == '<expr>')

jobs:
  # ─── A cada 5 minutos ──────────────────────────────────────────────────────

  publish-scheduled:
    name: 📅 Publicar posts agendados
    runs-on: ubuntu-latest
    timeout-minutes: 3
    continue-on-error: true
    concurrency:
      group: cron-publish-scheduled
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'publish-scheduled')
      || (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/publish-scheduled
          max_time: '60'
          cron_secret: ${{ secrets.CRON_SECRET }}

  fetch-news:
    name: 📰 Buscar notícias
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    concurrency:
      group: cron-fetch-news
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'fetch-news')
      || (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/fetch-news
          max_time: '300'
          cron_secret: ${{ secrets.CRON_SECRET }}

  tag-news:
    name: 🏷️ Taguear notícias
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    concurrency:
      group: cron-tag-news
      cancel-in-progress: false
    needs: fetch-news
    # Só roda se fetch-news teve sucesso (schedule) ou manualmente
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'tag-news')
      || (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *' && needs.fetch-news.result == 'success')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/tag-news
          max_time: '120'
          cron_secret: ${{ secrets.CRON_SECRET }}

  # ─── A cada 15 minutos ─────────────────────────────────────────────────────

  fetch-streaming-signals:
    name: 📡 Buscar sinais de streaming
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    concurrency:
      group: cron-fetch-streaming-signals
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'fetch-streaming-signals')
      || (github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/fetch-streaming-signals
          max_time: '120'
          cron_secret: ${{ secrets.CRON_SECRET }}

  # ─── A cada 6 horas ────────────────────────────────────────────────────────

  update-trending:
    name: 📈 Atualizar trending score
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    concurrency:
      group: cron-update-trending
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'update-trending')
      || (github.event_name == 'schedule' && github.event.schedule == '0 */6 * * *')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/update-trending
          max_time: '120'
          cron_secret: ${{ secrets.CRON_SECRET }}

  # ─── A cada hora ───────────────────────────────────────────────────────────

  sync-discography:
    name: 💿 Sincronizar discografia
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    concurrency:
      group: cron-sync-discography
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'sync-discography')
      || (github.event_name == 'schedule' && github.event.schedule == '0 * * * *')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/sync-discography
          max_time: '300'
          cron_secret: ${{ secrets.CRON_SECRET }}

  sync-cast:
    name: 🎭 Sincronizar elenco
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    concurrency:
      group: cron-sync-cast
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'sync-cast')
      || (github.event_name == 'schedule' && github.event.schedule == '0 * * * *')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/sync-cast?limit=15
          max_time: '300'
          cron_secret: ${{ secrets.CRON_SECRET }}

  # ─── Diário 02:00 UTC ──────────────────────────────────────────────────────

  sync-social-links:
    name: 🔗 Sincronizar redes sociais (Wikidata)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    concurrency:
      group: cron-sync-social-links
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'sync-social-links')
      || (github.event_name == 'schedule' && github.event.schedule == '0 2 * * *')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/sync-social-links-wikidata
          max_time: '600'
          cron_secret: ${{ secrets.CRON_SECRET }}

  artist-visibility:
    name: 👁️ Atualizar visibilidade de artistas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    concurrency:
      group: cron-artist-visibility
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'artist-visibility')
      || (github.event_name == 'schedule' && github.event.schedule == '0 2 * * *')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/artist-visibility
          max_time: '120'
          cron_secret: ${{ secrets.CRON_SECRET }}

  digest:
    name: 📬 Email digest de blog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    concurrency:
      group: cron-digest
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'digest')
      || (github.event_name == 'schedule' && github.event.schedule == '0 2 * * *')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/digest
          max_time: '300'
          cron_secret: ${{ secrets.CRON_SECRET }}

  # ─── Diário 03:00 UTC ──────────────────────────────────────────────────────

  fetch-streaming-shows:
    name: 🎬 Atualizar top shows de streaming
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    concurrency:
      group: cron-fetch-streaming-shows
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'fetch-streaming-shows')
      || (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/fetch-streaming-shows
          max_time: '120'
          cron_secret: ${{ secrets.CRON_SECRET }}

  import-streaming-unmatched:
    name: 🎬 Importar tops de streaming sem match
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    concurrency:
      group: cron-import-streaming-unmatched
      cancel-in-progress: false
    needs: fetch-streaming-shows
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'import-streaming-unmatched')
      || (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *' && needs.fetch-streaming-shows.result == 'success')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/import-streaming-unmatched?topN=20
          max_time: '240'
          cron_secret: ${{ secrets.CRON_SECRET }}

  # ─── Diário 11:00 UTC (08:00 BRT) ──────────────────────────────────────────

  refresh-productions:
    name: 🎞️ Radar de produções recentes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    concurrency:
      group: cron-refresh-productions
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'refresh-productions')
      || (github.event_name == 'schedule' && github.event.schedule == '0 11 * * *')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/refresh-productions?months_back=2&months_ahead=4&pages=2&max_imports=20&max_refreshes=30
          max_time: '600'
          cron_secret: ${{ secrets.CRON_SECRET }}

  # ─── Semanal domingo 07:00 UTC (04:00 BRT) ─────────────────────────────────

  sync-filmography:
    name: 🎬 Sincronizar filmografias desatualizadas (TMDB)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    concurrency:
      group: cron-sync-filmography
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'sync-filmography')
      || (github.event_name == 'schedule' && github.event.schedule == '0 7 * * 0')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/sync-filmography
          max_time: '540'
          cron_secret: ${{ secrets.CRON_SECRET }}

  sync-groups-discography:
    name: 🎵 Sincronizar discografia de grupos (Spotify)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    concurrency:
      group: cron-sync-groups-discography
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'sync-groups-discography')
      || (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/sync-groups-discography
          max_time: '1800'   # 30min — corrigido (era 60s)
          cron_secret: ${{ secrets.CRON_SECRET }}

  # ─── Semanal domingo 08:00 UTC (05:00 BRT) ─────────────────────────────────

  sync-cast-resync:
    name: 🔄 Re-sincronizar elenco (>90 dias)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    concurrency:
      group: cron-sync-cast
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'sync-cast-resync')
      || (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 0')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/sync-cast?limit=30&mode=resync
          max_time: '300'
          cron_secret: ${{ secrets.CRON_SECRET }}

  backfill-korean-flag:
    name: 🇰🇷 Backfill flag cultural coreana
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    concurrency:
      group: cron-backfill-korean-flag
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'backfill-korean-flag')
      || (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 0')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/backfill-korean-flag?limit=500
          max_time: '240'
          cron_secret: ${{ secrets.CRON_SECRET }}

  sync-hangul:
    name: 🔤 Sincronizar nomes Hangul (TMDB)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    concurrency:
      group: cron-sync-hangul
      cancel-in-progress: false
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'sync-hangul')
      || (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 0')
    steps:
      - uses: actions/checkout@v4
      - name: Resumo
        run: echo "| Job | HTTP | Resultado |" >> "$GITHUB_STEP_SUMMARY"; echo "|-----|------|-----------|" >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/cron-call
        with:
          endpoint: /api/cron/sync-hangul?limit=100
          max_time: '240'
          cron_secret: ${{ secrets.CRON_SECRET }}
