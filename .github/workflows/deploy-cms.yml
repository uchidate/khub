name: 🎨 Build and Deploy CMS

on:
  push:
    branches: [main]
    paths:
      - 'cms-app/**'
      - '.github/workflows/deploy-cms.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CMS image
        uses: docker/build-push-action@v5
        with:
          context: ./cms-app
          file: ./cms-app/Dockerfile
          push: true
          tags: ghcr.io/uchidate/khub-cms:staging

      - name: Deploy CMS to Coolify
        run: |
          curl --silent --show-error --fail \
            -X GET "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_CMS_STAGING_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
