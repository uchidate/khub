name: 🏥 Health Monitor

on:
  schedule:
    # A cada 5 minutos (mínimo do GitHub Actions)
    - cron: '*/5 * * * *'

  # Trigger manual para testes
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente para verificar'
        required: false
        default: 'production'
        type: choice
        options:
          - production

jobs:
  # Staging não gera alertas — downtime não é crítico e cria ruído desnecessário
  # O watchdog no servidor já reinicia containers automaticamente
  check-production:
    name: 🔴 Production Health
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SITE_URL: https://www.hallyuhub.com.br
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_ALERTS }}
      RESPONSE_TIMEOUT: 10

    steps:
      - name: 🚀 Verificar deploy em andamento
        id: check_deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUNNING=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/deploy.yml/runs?per_page=5" \
            -q '[.workflow_runs[] | select(.status == "in_progress" or .status == "queued" or .status == "waiting")] | length')
          echo "Deploy runs ativos: $RUNNING"
          if [ "$RUNNING" -gt "0" ]; then
            echo "deploy_running=true" >> $GITHUB_OUTPUT
            echo "⏭️ Deploy em andamento — health check ignorado para evitar falso positivo"
          else
            echo "deploy_running=false" >> $GITHUB_OUTPUT
          fi

      - name: 🏥 Check Production (1ª verificação)
        id: check_1
        if: steps.check_deploy.outputs.deploy_running != 'true'
        continue-on-error: true
        run: |
          check_endpoint() {
            local name=$1 url=$2 expected=${3:-200} json_key=${4:-""}
            local RESPONSE HTTP_CODE BODY CURL_EXIT

            RESPONSE=$(curl -s -w "\n%{http_code}" --max-time $RESPONSE_TIMEOUT --connect-timeout 5 \
              -H "Accept: application/json" "$url" 2>/dev/null)
            CURL_EXIT=$?
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            [ $CURL_EXIT -ne 0 ] && echo "❌ $name: connection error (curl $CURL_EXIT)" && return 1
            [ "$HTTP_CODE" != "$expected" ] && echo "❌ $name: HTTP $HTTP_CODE" && return 1
            if [ -n "$json_key" ]; then
              local VAL=$(echo "$BODY" | jq -r ".$json_key" 2>/dev/null)
              [ "$VAL" != "true" ] && echo "❌ $name: .$json_key = $VAL" && return 1
            fi
            echo "✅ $name: OK ($HTTP_CODE)"
            return 0
          }

          FAILED=0
          check_endpoint "Homepage"   "${SITE_URL}"            200     || FAILED=$((FAILED+1))
          check_endpoint "Health API" "${SITE_URL}/api/health" 200 "ok" || FAILED=$((FAILED+1))
          [ $FAILED -gt 0 ] && exit 1 || echo "All clear"

      - name: ⏳ Aguardar confirmação (falha transitória?)
        if: steps.check_1.outcome == 'failure' && steps.check_deploy.outputs.deploy_running != 'true'
        run: |
          echo "⚠️ 1ª verificação falhou — aguardando 90s antes de confirmar..."
          sleep 90

      - name: 🏥 Check Production (2ª verificação — confirmação)
        id: check_2
        if: steps.check_1.outcome == 'failure' && steps.check_deploy.outputs.deploy_running != 'true'
        run: |
          check_endpoint() {
            local name=$1 url=$2 expected=${3:-200} json_key=${4:-""}
            local RESPONSE HTTP_CODE BODY CURL_EXIT

            RESPONSE=$(curl -s -w "\n%{http_code}" --max-time $RESPONSE_TIMEOUT --connect-timeout 5 \
              -H "Accept: application/json" "$url" 2>/dev/null)
            CURL_EXIT=$?
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            [ $CURL_EXIT -ne 0 ] && echo "❌ $name: connection error" && return 1
            [ "$HTTP_CODE" != "$expected" ] && echo "❌ $name: HTTP $HTTP_CODE" && return 1
            if [ -n "$json_key" ]; then
              local VAL=$(echo "$BODY" | jq -r ".$json_key" 2>/dev/null)
              [ "$VAL" != "true" ] && echo "❌ $name: .$json_key = $VAL" && return 1
            fi
            echo "✅ $name: OK — production recuperou sozinha (falso positivo)"
            return 0
          }

          FAILED=0
          check_endpoint "Homepage"   "${SITE_URL}"            200     || FAILED=$((FAILED+1))
          check_endpoint "Health API" "${SITE_URL}/api/health" 200 "ok" || FAILED=$((FAILED+1))
          [ $FAILED -gt 0 ] && echo "❌ Falha confirmada após 90s" && exit 1
          echo "✅ Falso positivo — production está UP"

      - name: 🔔 Alert Slack — Production DOWN (confirmado)
        if: failure() && steps.check_deploy.outputs.deploy_running != 'true'
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"🚨 *PRODUCTION DOWN* — $TIMESTAMP\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"title\": \"HallyuHub Production está fora do ar\",
                \"text\": \"Duas verificações consecutivas falharam (90s de intervalo).\",
                \"fields\": [
                  {\"title\": \"URL\", \"value\": \"${SITE_URL}\", \"short\": true},
                  {\"title\": \"Logs\", \"value\": \"<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Ver run>\", \"short\": true}
                ],
                \"footer\": \"GitHub Actions Health Monitor\",
                \"ts\": $(date +%s)
              }]
            }"
