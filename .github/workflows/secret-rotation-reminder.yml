name: 🔑 Secret Rotation Reminder

# Lembrete mensal para rotacionar secrets que expiram.
# Abre uma issue automaticamente no primeiro dia de cada mês.

on:
  schedule:
    - cron: '0 9 1 * *'  # Dia 1 de cada mês às 9h UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  remind:
    name: 🔑 Criar issue de rotação de secrets
    runs-on: ubuntu-latest
    timeout-minutes: 3

    permissions:
      issues: write

    steps:
      - name: 📋 Abrir issue de rotação
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          MONTH=$(date '+%B %Y')
          BODY=$(printf '%s\n' \
            '## Checklist mensal de rotação de secrets' \
            '' \
            '- [ ] **CRON_SECRET** — gerar novo token e atualizar:' \
            '  1. Gerar: `openssl rand -hex 32`' \
            '  2. Atualizar no GitHub: `gh secret set CRON_SECRET`' \
            '  3. O deploy automático propaga para as cron tasks do Coolify' \
            '' \
            '- [ ] **COOLIFY_TOKEN** — verificar se ainda é válido:' \
            '  1. Testar: `curl -s https://coolify.hallyuhub.com.br/api/v1/health -H "Authorization: Bearer <token>"`' \
            '  2. Se expirado: renovar em Coolify UI → Profile → API Tokens' \
            '  3. Atualizar: `gh secret set COOLIFY_TOKEN`' \
            '' \
            '- [ ] **SSH_PRIVATE_KEY** — verificar acesso ao servidor:' \
            '  1. Testar: `ssh root@31.97.255.107 "echo ok"`' \
            '  2. Se falhar: gerar novo par e atualizar authorized_keys no servidor' \
            '' \
            '## Referências' \
            '- Skill `/set-env` para variáveis de ambiente da aplicação' \
            '- [GitHub Secrets](https://github.com/uchidate/khub/settings/secrets/actions)' \
            '' \
            '---' \
            '*Issue criada automaticamente pelo workflow `secret-rotation-reminder.yml`*')
          gh issue create \
            --title "🔑 [${MONTH}] Rotacionar secrets" \
            --body "$BODY" \
            --label "maintenance" || \
          gh issue create \
            --title "🔑 [${MONTH}] Rotacionar secrets" \
            --body "$BODY"
