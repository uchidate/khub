name: 🔄 Cron Job - Auto Update Content

on:
  schedule:
    # Runs every 2 hours at minute 0 (was every 1h — reduced to lower server load)
    # Format: minute hour day month day-of-week
    - cron: '0 */2 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-content:
    name: Update Artists & News
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📋 Call Cron Endpoint
        run: |
          echo "🚀 Calling cron endpoint..."

          # O endpoint retorna 202 Accepted imediatamente e processa em background
          # Timeout aumentado para 60s para evitar falhas em caso de latência
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 60 -X POST \
            "https://www.hallyuhub.com.br/api/cron/update" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "📊 Response Code: $HTTP_CODE"
          echo "📄 Response Body:"
          echo "$BODY" | jq '.' || echo "$BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Cron job accepted (processing in background)"

            # Parse response
            STATUS=$(echo "$BODY" | jq -r '.status // "unknown"')
            REQUEST_ID=$(echo "$BODY" | jq -r '.requestId // "unknown"')

            echo "📋 Status: $STATUS"
            echo "📋 Request ID: $REQUEST_ID"
          else
            echo "❌ Cron job failed with status $HTTP_CODE"
            exit 1
          fi

      - name: 📊 Summary
        if: always()
        run: |
          echo "## 🔄 Cron Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Endpoint**: https://www.hallyuhub.com.br/api/cron/update" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
