name: 🔍 Staging/Production Parity Check

on:
  pull_request:
  workflow_dispatch:

jobs:
  check-parity:
    name: Verificar Paridade Staging/Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: 🔍 Verificar paridade no deploy.yml
        run: |
          echo "=================================================="
          echo "🔍 VERIFICANDO PARIDADE STAGING/PRODUCTION"
          echo "=================================================="
          echo ""

          # Com o workflow reutilizável (_deploy-env.yml), staging e production
          # são garantidamente idênticos por design. A verificação aqui é que
          # ambos os jobs chamam o mesmo workflow reutilizável.

          STAGING_USES=$(grep -A2 'deploy-staging:' .github/workflows/deploy.yml | grep 'uses:' | awk '{print $2}')
          PRODUCTION_USES=$(grep -A2 'deploy-production:' .github/workflows/deploy.yml | grep 'uses:' | awk '{print $2}')

          echo "deploy-staging  usa: $STAGING_USES"
          echo "deploy-production usa: $PRODUCTION_USES"
          echo ""

          if [ "$STAGING_USES" = "$PRODUCTION_USES" ] && [ -n "$STAGING_USES" ]; then
            echo "✅ Ambos os ambientes usam o mesmo workflow reutilizável: $STAGING_USES"
            echo "   Paridade garantida estruturalmente — não é possível divergir."
          else
            echo "❌ FALHA: deploy-staging e deploy-production não usam o mesmo workflow!"
            echo "   Ambos devem referenciar .github/workflows/_deploy-env.yml"
            exit 1
          fi

      - name: 🔍 Verificar paridade nos docker-compose
        run: |
          echo ""
          echo "=================================================="
          echo "🔍 VERIFICANDO DOCKER-COMPOSE FILES"
          echo "=================================================="

          # Verificar se estrutura de services é idêntica
          staging_services=$(grep -E "^  [a-z-]+:" docker-compose.staging.yml | sort)
          prod_services=$(grep -E "^  [a-z-]+:" docker-compose.prod.yml | sort)

          # Normalizar nomes de ambiente para comparação
          staging_services_norm=$(echo "$staging_services" | sed 's/-staging/-XXX/g')
          prod_services_norm=$(echo "$prod_services" | sed 's/-production/-XXX/g')
          # Casos especiais: containers de production sem sufixo -production
          prod_services_norm=$(echo "$prod_services_norm" | sed 's/^  hallyuhub:$/  hallyuhub-XXX:/')
          prod_services_norm=$(echo "$prod_services_norm" | sed 's/^  prometheus:$/  prometheus-XXX:/')
          prod_services_norm=$(echo "$prod_services_norm" | sed 's/^  grafana:$/  grafana-XXX:/')

          if [ "$staging_services_norm" = "$prod_services_norm" ]; then
            echo "✅ Services idênticos em staging e production"
          else
            echo "❌ FALHA: Services diferentes entre staging e production!"
            echo ""
            echo "Staging services:"
            echo "$staging_services"
            echo ""
            echo "Production services:"
            echo "$prod_services"
            exit 1
          fi

          echo "✅ Paridade de docker-compose validada"

      - name: 📋 Resumo da Verificação
        if: success()
        run: |
          echo ""
          echo "=================================================="
          echo "✅ PARIDADE VALIDADA COM SUCESSO!"
          echo "=================================================="
          echo ""
          echo "Deploy usa workflow reutilizável (_deploy-env.yml):"
          echo "  → Paridade garantida por design. Impossível divergir."
          echo ""
          echo "Docker-compose services são espelhos."
          echo ""
          echo "Este PR está aprovado para merge."
