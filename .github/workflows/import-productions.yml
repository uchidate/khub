name: 🎬 Import Korean Productions from TMDB

on:
  # Executa diariamente às 04:00 UTC importando apenas o ano corrente
  schedule:
    - cron: '0 4 * * *'

  workflow_dispatch:
    inputs:
      start_year:
        description: 'Ano inicial (deixe vazio para usar o ano corrente)'
        required: false
        default: ''
        type: string
      end_year:
        description: 'Ano final (deixe vazio para usar o ano corrente)'
        required: false
        default: ''
        type: string
      types:
        description: 'Tipos a importar'
        required: true
        default: 'tv,movie'
        type: choice
        options:
          - tv,movie
          - tv
          - movie
      dry_run:
        description: 'Dry run (simula sem gravar)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  import-productions:
    name: 🎬 Import Korean Productions [${{ inputs.types || 'tv,movie' }}]${{ inputs.dry_run == 'true' && ' (DRY RUN)' || '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 🎬 Run Import Script on Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 360m
          script: |
            set -e
            cd /var/www/hallyuhub

            # Usar ano corrente se os inputs estiverem vazios (execução agendada)
            CURRENT_YEAR=$(date +%Y)
            START_YEAR="${{ inputs.start_year }}"
            END_YEAR="${{ inputs.end_year }}"
            TYPES="${{ inputs.types }}"
            DRY_RUN="${{ inputs.dry_run }}"

            [ -z "$START_YEAR" ] && START_YEAR="$CURRENT_YEAR"
            [ -z "$END_YEAR"   ] && END_YEAR="$CURRENT_YEAR"
            [ -z "$TYPES"      ] && TYPES="tv,movie"
            [ -z "$DRY_RUN"    ] && DRY_RUN="false"

            echo "🎬 Iniciando import de produções coreanas..."
            echo "   Período: $START_YEAR–$END_YEAR"
            echo "   Tipos: $TYPES"
            echo "   Dry run: $DRY_RUN"
            echo "──────────────────────────────────────────"

            docker-compose -f docker-compose.prod.yml exec -T hallyuhub \
              env START_YEAR=$START_YEAR \
                  END_YEAR=$END_YEAR \
                  TYPES=$TYPES \
                  DRY_RUN=$DRY_RUN \
              npx tsx scripts/import-productions-range.ts

      - name: 🎭 Trigger Cast Sync for New Productions
        if: success() && inputs.dry_run == 'false'
        run: |
          echo "🎭 Disparando sync de elenco para produções importadas (limit=50)..."

          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 -X POST \
            "https://www.hallyuhub.com.br/api/cron/sync-cast?limit=50" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "📊 Response: $HTTP_CODE"
          echo "$BODY" | jq '.' || echo "$BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Cast sync iniciado em background (as demais serão processadas pelo cron a cada 2h)"
          else
            echo "⚠️ Falha ao disparar cast sync (não crítico — cron irá processar automaticamente)"
          fi

      - name: 📊 Summary
        if: always()
        run: |
          CURRENT_YEAR=$(date +%Y)
          START="${{ inputs.start_year }}"; [ -z "$START" ] && START="$CURRENT_YEAR"
          END="${{ inputs.end_year }}";     [ -z "$END"   ] && END="$CURRENT_YEAR"
          TYPES="${{ inputs.types }}";      [ -z "$TYPES" ] && TYPES="tv,movie"
          DRY="${{ inputs.dry_run }}";      [ -z "$DRY"   ] && DRY="false"
          TRIGGER="${{ github.event_name }}"

          echo "## 🎬 Import Korean Productions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | $TRIGGER |" >> $GITHUB_STEP_SUMMARY
          echo "| **Período** | $START–$END |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tipos** | $TYPES |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dry Run** | $DRY |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Hora** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY

      - name: 📢 Notify Success
        if: success() && inputs.dry_run == 'false'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYS }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "✅ Import de produções concluído (${{ inputs.start_year }}–${{ inputs.end_year }}, tipos: ${{ inputs.types }})",
              "blocks": [{
                "type": "header",
                "text": {"type": "plain_text", "text": "✅ Import de Produções Concluído"}
              }, {
                "type": "section",
                "fields": [
                  {"type": "mrkdwn", "text": "*Período:* ${{ inputs.start_year }}–${{ inputs.end_year }}"},
                  {"type": "mrkdwn", "text": "*Tipos:* ${{ inputs.types }}"},
                  {"type": "mrkdwn", "text": "*Status:* ✅ Sucesso"}
                ]
              }, {
                "type": "section",
                "text": {"type": "mrkdwn", "text": "🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Ver logs completos>"}
              }]
            }' || true

      - name: 📢 Notify Failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYS }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "❌ Falha no import de produções (${{ inputs.start_year }}–${{ inputs.end_year }})",
              "blocks": [{
                "type": "header",
                "text": {"type": "plain_text", "text": "❌ Falha no Import de Produções"}
              }, {
                "type": "section",
                "text": {"type": "mrkdwn", "text": "🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Ver logs do erro>"}
              }]
            }' || true
