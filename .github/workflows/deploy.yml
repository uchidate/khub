# ═══════════════════════════════════════════════════════════════════
# BUILD & DEPLOY — HallyuHub (Coolify)
# ═══════════════════════════════════════════════════════════════════
# Fluxo:
#   push staging → validate → trigger deploy staging no Coolify
#   push main    → validate → trigger deploy production no Coolify
#
# O Coolify faz o build Docker e o deploy — o GitHub Actions só valida
# o código e dispara o webhook de deploy via API do Coolify.
# ═══════════════════════════════════════════════════════════════════

name: 🚀 Validate and Deploy (Coolify)

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════
  # FASE 1: Validação (lint + typecheck + tests)
  # ════════════════════════════════════════════════════════════════

  validate-code:
    name: ✅ Validate Code
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: |
          npx prisma generate
          npx prisma generate --schema=prisma-kpopping/schema.prisma --config=prisma-kpopping/prisma.config.ts

      - name: 🔍 Lint & Type Check
        run: |
          echo "::group::ESLint"
          npx eslint app/ lib/ --max-warnings 10
          echo "::endgroup::"

          echo "::group::TypeScript"
          npx tsc --noEmit
          echo "::endgroup::"

      - name: 🧪 Tests
        run: npx vitest run

      - name: 🔒 Security Audit
        run: npm audit --audit-level=high || echo "::warning::Vulnerabilidades high/critical encontradas — revisar"

  # ════════════════════════════════════════════════════════════════
  # FASE 2a: Deploy STAGING via Coolify API
  # ════════════════════════════════════════════════════════════════

  deploy-staging:
    name: 🟡 Deploy to Staging (Coolify)
    needs: validate-code
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: staging
      url: http://31.97.255.107:3001

    steps:
      - name: 🚀 Trigger Coolify Deploy
        run: |
          echo "Triggering Coolify deploy for staging (uuid: ${{ vars.COOLIFY_STAGING_UUID }})..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            "http://31.97.255.107:8000/api/v1/deploy?uuid=${{ vars.COOLIFY_STAGING_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Coolify deploy trigger failed (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "✅ Deploy triggered successfully (HTTP $HTTP_CODE)"

      - name: 📊 Summary
        run: |
          echo "### 🟡 Deploy Staging Disparado" >> $GITHUB_STEP_SUMMARY
          echo "O Coolify está buildando e deployando. [Acompanhe aqui](http://31.97.255.107:8000)" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # FASE 2b: Deploy PRODUCTION via Coolify API
  # ════════════════════════════════════════════════════════════════

  deploy-production:
    name: 🟢 Deploy to Production (Coolify)
    needs: validate-code
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: production
      url: https://www.hallyuhub.com.br

    steps:
      - name: 🚀 Trigger Coolify Deploy
        run: |
          echo "Triggering Coolify deploy for production (uuid: ${{ vars.COOLIFY_PRODUCTION_UUID }})..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            "http://31.97.255.107:8000/api/v1/deploy?uuid=${{ vars.COOLIFY_PRODUCTION_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Coolify deploy trigger failed (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "✅ Deploy triggered successfully (HTTP $HTTP_CODE)"

      - name: 📊 Summary
        run: |
          echo "### 🟢 Deploy Production Disparado" >> $GITHUB_STEP_SUMMARY
          echo "O Coolify está buildando e deployando. [Acompanhe aqui](http://31.97.255.107:8000)" >> $GITHUB_STEP_SUMMARY
