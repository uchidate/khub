# ═══════════════════════════════════════════════════════════════════
# BUILD & DEPLOY — HallyuHub (Coolify)
# ═══════════════════════════════════════════════════════════════════
# Fluxo:
#   feat/* ou staging → validate → build image → push ghcr.io:staging → deploy Coolify staging
#   main (PR merge)   → validate → build image do main → push staging → promote staging→latest → deploy Coolify production
#
# Desenvolvimento:
#   1. git checkout -b feat/minha-feature
#   2. Desenvolve e commita localmente
#   3. git push origin feat/minha-feature   → CI valida + deploya em staging automaticamente
#   4. Testa em staging.hallyuhub.com.br
#   5. Abre PR feat/minha-feature → main no GitHub
#   6. Merge do PR → CI deploya em produção (mesma imagem testada, sem rebuild)
# ═══════════════════════════════════════════════════════════════════

name: 🚀 Validate, Build and Deploy (Coolify)

on:
  push:
    branches:
      - main
      - staging
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch para buildar e deployar em staging'
        required: true
        default: 'staging'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ════════════════════════════════════════════════════════════════
  # FASE 1: Validação (lint + typecheck + tests)
  # ════════════════════════════════════════════════════════════════

  validate-code:
    name: ✅ Validate Code
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: |
          npx prisma generate
          npx prisma generate --schema=prisma-kpopping/schema.prisma --config=prisma-kpopping/prisma.config.ts

      - name: 🔍 Lint & Type Check
        run: |
          echo "::group::ESLint"
          npx eslint app/ lib/ --max-warnings 10
          echo "::endgroup::"
          echo "::group::TypeScript"
          npx tsc --noEmit
          echo "::endgroup::"

      - name: 🧪 Tests
        run: npx vitest run

      - name: 🔒 Security Audit
        run: npm audit --audit-level=high || echo "::warning::Vulnerabilidades high/critical encontradas — revisar"

  # ════════════════════════════════════════════════════════════════
  # FASE 2a: Build da imagem Docker (feat/*, fix/*, chore/*, staging — não main)
  # ════════════════════════════════════════════════════════════════

  build-image:
    name: 🐳 Build Docker Image
    needs: validate-code
    if: github.ref != 'refs/heads/main' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Rollback Image
        run: |
          SOURCE_TAG="ghcr.io/${{ env.IMAGE_NAME }}:staging"
          ROLLBACK_TAG="ghcr.io/${{ env.IMAGE_NAME }}:rollback-staging"
          docker pull "$SOURCE_TAG" 2>/dev/null && \
            docker tag "$SOURCE_TAG" "$ROLLBACK_TAG" && \
            docker push "$ROLLBACK_TAG" && \
            echo "✅ Rollback image saved: $ROLLBACK_TAG" || \
            echo "⚠️ No previous image to save (first deploy)"

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_ADSENSE_CLIENT=${{ vars.NEXT_PUBLIC_ADSENSE_CLIENT }}
            NEXT_PUBLIC_ADSENSE_SLOT_AUTO=${{ vars.NEXT_PUBLIC_ADSENSE_SLOT_AUTO }}
            NEXT_PUBLIC_ADSENSE_SLOT_ANCHOR=${{ vars.NEXT_PUBLIC_ADSENSE_SLOT_ANCHOR }}
            NEXT_PUBLIC_ADSENSE_SLOT_SIDE_RAIL=${{ vars.NEXT_PUBLIC_ADSENSE_SLOT_SIDE_RAIL }}
            NEXT_PUBLIC_ADSENSE_SLOT_SIDEBAR=${{ vars.NEXT_PUBLIC_ADSENSE_SLOT_SIDEBAR }}
            NEXT_PUBLIC_ADSENSE_SLOT_FLUID=${{ vars.NEXT_PUBLIC_ADSENSE_SLOT_FLUID }}
            NEXT_PUBLIC_ADSENSE_SLOT_HOME=${{ vars.NEXT_PUBLIC_ADSENSE_SLOT_HOME }}
            NEXT_PUBLIC_ADSENSE_SLOT_MULTIPLEX=${{ vars.NEXT_PUBLIC_ADSENSE_SLOT_MULTIPLEX }}
            NEXT_PUBLIC_GA_ID=${{ vars.NEXT_PUBLIC_GA_ID }}
            NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION=${{ vars.NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION }}
            NEXT_PUBLIC_BING_SITE_VERIFICATION=${{ vars.NEXT_PUBLIC_BING_SITE_VERIFICATION }}
            NEXT_PUBLIC_UMAMI_WEBSITE_ID=${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/uchidate/khub:staging
          cache-to: type=gha,mode=max

      - name: 📊 Summary
        run: |
          echo "### 🐳 Imagem buildada e enviada para ghcr.io" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # FASE 2c: E2E Tests — roda contra staging após deploy
  # ════════════════════════════════════════════════════════════════

  e2e-staging:
    name: 🎭 E2E Tests (Staging)
    needs: deploy-staging
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-chromium-

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: 🎭 Run E2E Tests
        run: npx playwright test
        env:
          BASE_URL: https://staging.hallyuhub.com.br

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════
  # FASE 2b: Promote staging → production (apenas main, sem rebuild)
  # ════════════════════════════════════════════════════════════════

  promote-image:
    name: 🏷️ Promote Image to Production
    needs: [validate-code, build-image]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Rollback Image
        run: |
          SOURCE_TAG="ghcr.io/${{ env.IMAGE_NAME }}:latest"
          ROLLBACK_TAG="ghcr.io/${{ env.IMAGE_NAME }}:rollback-latest"
          docker pull "$SOURCE_TAG" 2>/dev/null && \
            docker tag "$SOURCE_TAG" "$ROLLBACK_TAG" && \
            docker push "$ROLLBACK_TAG" && \
            echo "✅ Rollback image saved: $ROLLBACK_TAG" || \
            echo "⚠️ No previous image to save (first deploy)"

      - name: Promote staging → latest
        run: |
          STAGING_TAG="ghcr.io/${{ env.IMAGE_NAME }}:staging"
          LATEST_TAG="ghcr.io/${{ env.IMAGE_NAME }}:latest"
          SHA_TAG="ghcr.io/${{ env.IMAGE_NAME }}:main-${{ github.sha }}"

          echo "Pulling staging image..."
          docker pull "$STAGING_TAG" || { echo "❌ Imagem staging não encontrada — faça push para staging primeiro"; exit 1; }

          echo "Promoting $STAGING_TAG → $LATEST_TAG"
          docker tag "$STAGING_TAG" "$LATEST_TAG"
          docker tag "$STAGING_TAG" "$SHA_TAG"
          docker push "$LATEST_TAG"
          docker push "$SHA_TAG"
          echo "✅ Imagem promovida para production (sem rebuild)"

      - name: 📊 Summary
        run: |
          echo "### 🏷️ Imagem promovida staging → production" >> $GITHUB_STEP_SUMMARY
          echo "A mesma imagem testada em staging foi para production — sem rebuild." >> $GITHUB_STEP_SUMMARY
          echo "**SHA tag:** \`main-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # FASE 3a: Deploy STAGING — Coolify faz pull da imagem pronta
  # ════════════════════════════════════════════════════════════════

  deploy-staging:
    name: 🟡 Deploy to Staging (Coolify)
    needs: build-image
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: staging
      url: https://staging.hallyuhub.com.br

    steps:
      - name: 🔑 Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "UserKnownHostsFile /dev/null" >> ~/.ssh/config

      - name: 🚀 Trigger Coolify Deploy
        run: |
          UUID="${{ vars.COOLIFY_STAGING_UUID }}"
          TOKEN="${{ secrets.COOLIFY_TOKEN }}"
          echo "Triggering Coolify deploy for staging via server SSH (uuid: $UUID)..."
          RESPONSE=$(ssh -i ~/.ssh/id_rsa root@31.97.255.107 \
            "curl -s -w '\n%{http_code}' -X GET \
              --connect-timeout 10 --max-time 60 \
              \"https://coolify.hallyuhub.com.br/api/v1/deploy?uuid=${UUID}&force=true\" \
              -H \"Authorization: Bearer ${TOKEN}\" \
              -H 'Content-Type: application/json'")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Coolify deploy trigger failed (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "✅ Deploy triggered (HTTP $HTTP_CODE)"

      - name: 🔍 Smoke Test
        run: |
          echo "Aguardando container subir..."
          for i in $(seq 1 18); do
            sleep 10
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 \
              --resolve "staging.hallyuhub.com.br:443:31.97.255.107" \
              https://staging.hallyuhub.com.br/api/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ Staging health check OK após $((i * 10))s"
              exit 0
            fi
            echo "⏳ Tentativa $i/12: HTTP $HTTP"
          done
          echo "❌ Staging não respondeu após 120s"
          exit 1

      - name: 📊 Summary
        run: |
          echo "### 🟡 Deploy Staging Concluído" >> $GITHUB_STEP_SUMMARY
          echo "Coolify fez pull da imagem e o container está respondendo." >> $GITHUB_STEP_SUMMARY
          echo "[Acompanhe aqui](http://31.97.255.107:8000)" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # FASE 3b: Deploy PRODUCTION — Coolify faz pull da imagem pronta
  # ════════════════════════════════════════════════════════════════

  deploy-production:
    name: 🟢 Deploy to Production (Coolify)
    needs: promote-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: production
      url: https://www.hallyuhub.com.br

    steps:
      - name: 🔑 Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "UserKnownHostsFile /dev/null" >> ~/.ssh/config

      - name: 🚀 Trigger Coolify Deploy
        run: |
          UUID="${{ vars.COOLIFY_PRODUCTION_UUID }}"
          TOKEN="${{ secrets.COOLIFY_TOKEN }}"
          echo "Triggering Coolify deploy for production via server SSH (uuid: $UUID)..."
          RESPONSE=$(ssh -i ~/.ssh/id_rsa root@31.97.255.107 \
            "curl -s -w '\n%{http_code}' -X GET \
              --connect-timeout 10 --max-time 60 \
              \"https://coolify.hallyuhub.com.br/api/v1/deploy?uuid=${UUID}&force=true\" \
              -H \"Authorization: Bearer ${TOKEN}\" \
              -H 'Content-Type: application/json'")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Coolify deploy trigger failed (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "✅ Deploy triggered (HTTP $HTTP_CODE)"

      - name: 🔍 Smoke Test
        run: |
          echo "Aguardando container subir..."
          for i in $(seq 1 18); do
            sleep 10
            # Acessa via IP direto para evitar bloqueio do Cloudflare nos IPs do GitHub Actions
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 \
              --resolve "www.hallyuhub.com.br:443:31.97.255.107" \
              https://www.hallyuhub.com.br/api/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ Production health check OK após $((i * 10))s"
              exit 0
            fi
            echo "⏳ Tentativa $i/18: HTTP $HTTP"
          done
          echo "❌ Production não respondeu após 180s"
          exit 1

      - name: 🔧 Atualizar container nas Scheduled Tasks
        run: |
          # Após deploy, o container recebe um novo nome — atualizar todas as tasks
          APP_UUID="e6h2xvvpu8i2jmzcb3tpzmxo"
          TOKEN="${{ secrets.COOLIFY_TOKEN }}"
          CONTAINER=$(ssh -i ~/.ssh/id_rsa root@31.97.255.107 \
            "curl -s 'http://localhost:8000/api/v1/applications/${APP_UUID}/containers' \
              -H 'Authorization: Bearer ${TOKEN}' | jq -r '.[0].Names // .[0].name // empty' | head -1 | tr -d '/'" 2>/dev/null)
          if [ -z "$CONTAINER" ]; then
            echo "⚠️ Não foi possível detectar o container name — tasks não atualizadas"
            exit 0
          fi
          echo "Container detectado: $CONTAINER"
          CRON_SECRET="${{ secrets.CRON_SECRET }}"
          ssh -i ~/.ssh/id_rsa root@31.97.255.107 \
            "docker exec coolify-db psql -U coolify coolify -c \"UPDATE scheduled_tasks SET container = '${CONTAINER}' WHERE application_id = (SELECT id FROM applications WHERE uuid = '${APP_UUID}');\"" 2>/dev/null \
            && echo "✅ Scheduled tasks atualizadas com container: $CONTAINER" \
            || echo "⚠️ Falha ao atualizar scheduled tasks (não crítico)"
          # Garantir que CRON_SECRET está populado em todos os comandos
          if [ -n "$CRON_SECRET" ]; then
            ssh -i ~/.ssh/id_rsa root@31.97.255.107 \
              "docker exec coolify-db psql -U coolify coolify -c \"UPDATE scheduled_tasks SET command = REGEXP_REPLACE(command, 'Bearer [^ '']*', 'Bearer ${CRON_SECRET}') WHERE enabled = true AND application_id = (SELECT id FROM applications WHERE uuid = '${APP_UUID}');\"" 2>/dev/null \
              && echo "✅ CRON_SECRET atualizado nos comandos" \
              || echo "⚠️ Falha ao atualizar CRON_SECRET (não crítico)"
          fi

      - name: 📊 Summary
        run: |
          echo "### 🟢 Deploy Production Concluído" >> $GITHUB_STEP_SUMMARY
          echo "Coolify fez pull da imagem e o container está respondendo." >> $GITHUB_STEP_SUMMARY
          echo "[Acompanhe aqui](http://31.97.255.107:8000)" >> $GITHUB_STEP_SUMMARY
