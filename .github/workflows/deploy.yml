# ═══════════════════════════════════════════════════════════════════
# BUILD & DEPLOY — HallyuHub
# ═══════════════════════════════════════════════════════════════════
# Fluxo: validate → build → deploy-staging | deploy-production
#
# Deploy de staging e production são idênticos por design —
# ambos chamam o mesmo workflow reutilizável (_deploy-env.yml)
# com parâmetros diferentes. Paridade garantida estruturalmente.
# ═══════════════════════════════════════════════════════════════════

name: 🚀 Build and Deploy (Optimized)

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ════════════════════════════════════════════════════════════════
  # FASE 1: Validação (lint + typecheck + tests)
  # ════════════════════════════════════════════════════════════════

  validate-code:
    name: ✅ Validate Code
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: |
          npx prisma generate
          npx prisma generate --schema=prisma-kpopping/schema.prisma --config=prisma-kpopping/prisma.config.ts

      - name: 🔍 Lint & Type Check
        run: |
          echo "::group::ESLint"
          npx eslint app/ lib/ --max-warnings 10
          echo "::endgroup::"

          echo "::group::TypeScript"
          npx tsc --noEmit
          echo "::endgroup::"

      - name: 🧪 Tests
        run: npx vitest run

      - name: 🔒 Security Audit
        run: npm audit --audit-level=high || echo "::warning::Vulnerabilidades high/critical encontradas — revisar antes do próximo deploy"

      - name: 📊 Summary
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" && "${{ github.event_name }}" == "push" ]]; then
            echo "::warning::⚠️ Push direto para main detectado! Processo recomendado: staging → PR → main"
          fi
          echo "### ✅ Validação Concluída" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ ESLint, TypeScript, Vitest passaram" >> $GITHUB_STEP_SUMMARY
          echo "- ℹ️  Build via Docker (único artefato)" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # FASE 2: Build da Imagem Docker
  # ════════════════════════════════════════════════════════════════

  build-image:
    name: 🐳 Build Docker Image
    needs: validate-code
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
            type=sha,prefix={{branch}}-
          labels: |
            org.opencontainers.image.title=HallyuHub
            org.opencontainers.image.description=K-pop content platform

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache (primário) + registry cache (fallback quando GHA expira)
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/uchidate/khub:staging,enable=${{ github.ref == 'refs/heads/staging' }}
            type=registry,ref=ghcr.io/uchidate/khub:latest,enable=${{ github.ref == 'refs/heads/main' }}
          cache-to: type=gha,mode=max

      - name: 📊 Summary
        run: |
          echo "### 🐳 Imagem Docker Buildada" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # FASE 3a: Deploy STAGING
  # ════════════════════════════════════════════════════════════════

  deploy-staging:
    name: 🟡 Deploy to Staging
    needs: build-image
    if: github.ref == 'refs/heads/staging'
    uses: ./.github/workflows/_deploy-env.yml
    secrets: inherit
    with:
      environment:       staging
      deploy_label:      STAGING
      label_emoji:       "🟡"
      runner:            '["self-hosted", "staging"]'
      environment_url:   http://31.97.255.107:3001

      env_file:          .env.staging
      compose_file:      docker-compose.staging.yml
      nginx_conf:        docker/nginx/nginx.staging.conf
      nginx_site:        hallyuhub-staging

      container_name:    hallyuhub-staging
      migrate_name:      migrate-staging
      image_tag:         staging

      health_url:        http://31.97.255.107:3001/api/health
      base_url:          http://31.97.255.107:3001
      site_url:          http://31.97.255.107:3001

      db_host:           postgres-staging
      db_name:           hallyuhub_staging
      connection_limit:  "8"
      pg_grep_pattern:   postgres.staging|staging.postgres

      ollama_host:       ollama-staging
      ollama_model:      gemma:2b

      post_deploy_command: "echo '✅ Staging deployed'"
      suppress_slack_on_success: true

  # ════════════════════════════════════════════════════════════════
  # FASE 3b: Deploy PRODUCTION
  # ════════════════════════════════════════════════════════════════

  deploy-production:
    name: 🟢 Deploy to Production
    needs: build-image
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy-env.yml
    secrets: inherit
    with:
      environment:       production
      deploy_label:      PRODUCTION
      label_emoji:       "🟢"
      runner:            '["self-hosted", "production"]'
      environment_url:   https://www.hallyuhub.com.br

      env_file:          .env.production
      compose_file:      docker-compose.prod.yml
      nginx_conf:        docker/nginx/nginx.prod.conf
      nginx_site:        hallyuhub

      container_name:    hallyuhub
      migrate_name:      migrate-production
      image_tag:         latest

      health_url:        https://www.hallyuhub.com.br/api/health
      base_url:          https://www.hallyuhub.com.br
      site_url:          https://www.hallyuhub.com.br

      db_host:           postgres-production
      db_name:           hallyuhub_production
      connection_limit:  "10"
      pg_grep_pattern:   postgres.production|production.postgres

      ollama_host:       ollama-production
      ollama_model:      phi3:mini

      post_deploy_command: "./scripts/verify-production.sh"
      suppress_slack_on_success: false
