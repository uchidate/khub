# ═══════════════════════════════════════════════════════════════════
# WORKFLOW OTIMIZADO - Reduz tempo total de deploy em ~40-60%
# ═══════════════════════════════════════════════════════════════════
# Mudanças principais:
# - validate-code NÃO faz build (apenas lint + typecheck)
# - Cache de node_modules entre runs
# - Health checks mais rápidos (2s interval)
# - BuildKit cache mode=max
# ═══════════════════════════════════════════════════════════════════

name: 🚀 Build and Deploy (Optimized)

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ════════════════════════════════════════════════════════════════
  # 📋 FASE 1: Validação Rápida (OTIMIZADA - sem build)
  # ════════════════════════════════════════════════════════════════

  validate-code:
    name: ✅ Validate Code
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Reduzido de 10 para 5 (sem build)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # OTIMIZAÇÃO: Cache de node_modules (economiza 30-60s)
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Generate Prisma Client
        run: |
          npx prisma generate
          npx prisma generate --schema=prisma-kpopping/schema.prisma --config=prisma-kpopping/prisma.config.ts

      - name: 🔍 Run Linters & Type Check
        run: |
          echo "::group::ESLint"
          npx eslint app/ lib/ --max-warnings 10
          echo "::endgroup::"

          echo "::group::TypeScript"
          npx tsc --noEmit
          echo "::endgroup::"

      - name: 🧪 Run Tests
        run: npx vitest run

      - name: 🔒 Security Audit
        run: npm audit --audit-level=high || echo "::warning::Vulnerabilidades high/critical encontradas — revisar antes do próximo deploy"

      # OTIMIZAÇÃO: Build removido! Docker faz o build uma única vez
      # ❌ ANTES: npm run build (2-3min desperdiçados)
      # ✅ DEPOIS: Docker build faz isso de forma otimizada

      - name: 📊 Summary
        run: |
          echo "### ✅ Validação Concluída" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ ESLint passou" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ TypeScript type-check passou" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Vitest testes passaram" >> $GITHUB_STEP_SUMMARY
          echo "- ℹ️  Build será feito no Docker (otimizado)" >> $GITHUB_STEP_SUMMARY

  check-deploy-process:
    name: 📋 Check Deploy Process
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Validate Process
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" && "${{ github.event_name }}" == "push" ]]; then
            echo "::warning::⚠️ Push direto para main detectado!"
            echo "::warning::Processo recomendado: staging → STAGING → PR → main"
          fi

          if [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "### 🟡 Deploy para Staging" >> $GITHUB_STEP_SUMMARY
            echo "Após deploy, valide em: http://31.97.255.107:3001" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "### 🔍 Pull Request" >> $GITHUB_STEP_SUMMARY
            echo "Apenas validação será executada (sem deploy)" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════
  # 🐳 FASE 2: Build da Imagem Docker (OTIMIZADA)
  # ════════════════════════════════════════════════════════════════

  build-image:
    name: 🐳 Build Docker Image
    needs: [validate-code, check-deploy-process]
    runs-on: ubuntu-latest
    timeout-minutes: 12  # Reduzido de 15 para 12 (build mais rápido)
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
            type=sha,prefix={{branch}}-
          labels: |
            org.opencontainers.image.title=HallyuHub
            org.opencontainers.image.description=K-pop content platform

      # OTIMIZAÇÃO: Usa Dockerfile otimizado (prisma generate UMA vez, deps produção)
      - name: Build and Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # OTIMIZAÇÃO: mode=max para cache mais agressivo
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: 📊 Summary
        run: |
          echo "### 🐳 Imagem Docker Buildada" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # 🟡 FASE 3a: Deploy STAGING (OTIMIZADO)
  # ════════════════════════════════════════════════════════════════

  deploy-staging:
    name: 🟡 Deploy to Staging
    needs: build-image
    runs-on: [self-hosted, staging]
    timeout-minutes: 8  # Reduzido de 10 para 8
    if: github.ref == 'refs/heads/staging'

    environment:
      name: staging
      url: http://31.97.255.107:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 📢 Notify Start
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYS }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | head -c 100)
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"🚀 Deploy STAGING iniciado\", \"blocks\": [{\"type\": \"header\", \"text\": {\"type\": \"plain_text\", \"text\": \"🚀 Deploy STAGING Iniciado\"}}, {\"type\": \"section\", \"fields\": [{\"type\": \"mrkdwn\", \"text\": \"*Branch:*\\n\`${{ github.ref_name }}\`\"}, {\"type\": \"mrkdwn\", \"text\": \"*Commit:*\\n\`${GITHUB_SHA:0:7}\`\"}]}, {\"type\": \"section\", \"text\": {\"type\": \"mrkdwn\", \"text\": \"*Mensagem:*\\n> $COMMIT_MSG\"}}]}"

      - name: 🏷️ Prepare Environment & Directory
        run: |
          set -e
          echo "📁 Ensuring base directory exists..."
          sudo mkdir -p /var/www/hallyuhub
          sudo chown -R github-runner:github-runner /var/www/hallyuhub

          cd /var/www/hallyuhub

          if [ ! -f .env.staging ]; then
            echo "⚠️ .env.staging not found! Creating..."
            [ -f .env.staging.bak ] && cp .env.staging.bak .env.staging || touch .env.staging
          fi

          cp .env.staging .env.staging.bak
          sed -i '/^=/d' .env.staging

          update_env() {
            key=$1; val=$2
            [ -z "$val" ] && return
            grep -q "^${key}=" .env.staging && sed -i "s|^${key}=.*|${key}=${val}|" .env.staging || echo "${key}=${val}" >> .env.staging
          }

          update_env "TMDB_API_KEY" "${{ secrets.TMDB_API_KEY }}"
          update_env "UNSPLASH_ACCESS_KEY" "${{ secrets.UNSPLASH_ACCESS_KEY }}"
          update_env "GEMINI_API_KEY" "${{ secrets.GEMINI_API_KEY }}"
          update_env "DATABASE_URL" "postgresql://hallyuhub:${{ secrets.POSTGRES_PASSWORD }}@postgres-staging:5432/hallyuhub_staging"
          update_env "KPOPPING_DATABASE_URL" "postgresql://hallyuhub:${{ secrets.POSTGRES_PASSWORD }}@postgres-production:5432/kpopping_db"
          update_env "OLLAMA_BASE_URL" "http://ollama-staging:11434"
          update_env "OLLAMA_MODEL" "gemma:2b"
          update_env "NEXT_PUBLIC_SITE_URL" "http://31.97.255.107:3001"
          update_env "NEXT_PUBLIC_ADSENSE_CLIENT" "ca-pub-6015098995926392"
          update_env "GOOGLE_CLIENT_ID" "${{ secrets.GOOGLE_CLIENT_ID }}"
          update_env "GOOGLE_CLIENT_SECRET" "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          update_env "RESEND_API_KEY" "${{ secrets.RESEND_API_KEY }}"

          chmod 600 .env.staging

          # Shared .env for docker-compose variable interpolation (GF_SECURITY_ADMIN_PASSWORD, POSTGRES_PASSWORD)
          touch .env
          grep -q "^GF_SECURITY_ADMIN_PASSWORD=" .env && sed -i "s|^GF_SECURITY_ADMIN_PASSWORD=.*|GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}|" .env || echo "GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}" >> .env

      - name: Copy Files to Deploy Directory
        run: |
          cp -f docker-compose.staging.yml /var/www/hallyuhub/
          cp -rf scripts /var/www/hallyuhub/
          cp -rf monitoring /var/www/hallyuhub/

      - name: 💾 Save rollback image
        id: save-rollback
        run: |
          ROLLBACK_ID=$(docker images --no-trunc --format "{{.ID}}" ghcr.io/uchidate/khub:staging 2>/dev/null | head -1)
          echo "image-id=$ROLLBACK_ID" >> $GITHUB_OUTPUT
          echo "Rollback image: ${ROLLBACK_ID:0:20}..."

      - name: Deploy to Staging
        run: |
          set -e
          cd /var/www/hallyuhub

          COMPOSE_CMD=$(docker compose version >/dev/null 2>&1 && echo "docker compose" || echo "docker-compose")

          echo "🧹 Limpando imagens antigas..."
          docker images ghcr.io/uchidate/khub --format "{{.ID}} {{.CreatedAt}}" | tail -n +4 | awk '{print $1}' | xargs -r docker rmi -f 2>/dev/null || true

          echo "📥 Pulling images..."
          $COMPOSE_CMD -f docker-compose.staging.yml pull hallyuhub-staging

          echo "🛑 Parando containers antigos..."
          $COMPOSE_CMD -f docker-compose.staging.yml down || true
          docker network rm backend-staging 2>/dev/null || true

          echo "🚀 Iniciando containers..."
          $COMPOSE_CMD -f docker-compose.staging.yml up -d

          echo "⏳ Aguardando postgres aceitar conexões..."
          POSTGRES_CONTAINER=$(docker ps --format '{{.Names}}' | grep -E 'postgres.staging|staging.postgres' | head -1)
          if [ -n "$POSTGRES_CONTAINER" ]; then
            for i in {1..30}; do
              if docker exec "$POSTGRES_CONTAINER" pg_isready -U hallyuhub -d hallyuhub_staging >/dev/null 2>&1; then
                echo "✅ Postgres ready after ${i}s"
                break
              fi
              [ $i -eq 30 ] && echo "⚠️ Postgres timeout, proceeding anyway"
              sleep 1
            done
          fi

          echo "🔐 Syncing DB user password..."
          if [ -z "$POSTGRES_CONTAINER" ]; then
            echo "⚠️ Postgres staging container not found, skipping password sync"
          else
            docker exec "$POSTGRES_CONTAINER" psql -U hallyuhub -d hallyuhub_staging -c \
              "ALTER USER hallyuhub PASSWORD '${{ secrets.POSTGRES_PASSWORD }}';" 2>&1 \
              && echo "✅ Password synced" \
              || echo "⚠️ Password sync failed (non-blocking)"
          fi

          # OTIMIZAÇÃO: Health check mais rápido (2s interval, 18 retries)
          echo "⏳ Aguardando container ficar healthy..."
          max_retries=18
          count=0
          until [ "$(docker inspect -f '{{.State.Health.Status}}' hallyuhub-staging 2>/dev/null)" == "healthy" ] || [ $count -eq $max_retries ]; do
            health_status=$(docker inspect -f '{{.State.Health.Status}}' hallyuhub-staging 2>/dev/null || echo "unknown")
            echo "Aguardando... (Status: $health_status, $((count+1))/$max_retries)"
            sleep 2
            count=$((count+1))
          done

          [ $count -eq $max_retries ] && echo "❌ Timeout" && $COMPOSE_CMD -f docker-compose.staging.yml logs hallyuhub-staging | tail -n 50 && exit 1

          # OTIMIZAÇÃO: Skip migrations se DB já está atualizado
          echo "🔍 Checking migrations..."
          MIGRATE_STATUS=$($COMPOSE_CMD -f docker-compose.staging.yml exec -T hallyuhub-staging npx prisma migrate status 2>&1 || echo "status_failed")

          if echo "$MIGRATE_STATUS" | grep -qi "up to date"; then
            echo "✅ No pending migrations - skipping"
          else
            echo "🔄 Applying migrations..."
            $COMPOSE_CMD -f docker-compose.staging.yml exec -T hallyuhub-staging npx prisma migrate deploy || echo "⚠️ Migration failed (continuing)"
          fi

          chmod +x scripts/export-cron-info.sh scripts/setup-auto-generation.sh
          ./scripts/export-cron-info.sh staging
          NODE_ENV=staging ./scripts/setup-auto-generation.sh -f --no-test || echo "⚠️ Verification warning (non-blocking)"

      - name: 🔍 Health Check + Auto Rollback
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYS }}
          ROLLBACK_IMAGE: ${{ steps.save-rollback.outputs.image-id }}
        run: |
          cd /var/www/hallyuhub
          COMPOSE_CMD=$(docker compose version >/dev/null 2>&1 && echo "docker compose" || echo "docker-compose")

          max_attempts=12; attempt=0
          while [ $attempt -lt $max_attempts ]; do
            curl -sf http://31.97.255.107:3001/api/health > /dev/null && echo "✅ OK" && exit 0
            attempt=$((attempt + 1)); sleep 3
          done

          echo "❌ Health check falhou após ${max_attempts} tentativas"

          if [ -n "$ROLLBACK_IMAGE" ]; then
            echo "🔄 Iniciando rollback automático..."
            docker tag "$ROLLBACK_IMAGE" ghcr.io/uchidate/khub:staging
            $COMPOSE_CMD -f docker-compose.staging.yml down
            $COMPOSE_CMD -f docker-compose.staging.yml up -d
            sleep 5
            echo "✅ Rollback concluído"
            curl -s -X POST "$SLACK_WEBHOOK" -H 'Content-Type: application/json' \
              -d "{\"text\": \"🔄 *ROLLBACK AUTOMÁTICO* em STAGING!\\nDeploy \`${GITHUB_SHA:0:7}\` falhou no health check — revertido para versão anterior.\"}"
          else
            curl -s -X POST "$SLACK_WEBHOOK" -H 'Content-Type: application/json' \
              -d '{"text": "❌ *Deploy STAGING FALHOU!* Health check falhou e sem imagem de rollback. Intervenção manual necessária!"}'
          fi
          exit 1

      - name: 📊 Summary
        if: success()
        run: |
          echo "### ✅ Deploy STAGING Concluído" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** http://31.97.255.107:3001" >> $GITHUB_STEP_SUMMARY

      - name: 📢 Notify Result
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYS }}
        run: |
          STATUS_EMOJI=$([ "${{ job.status }}" == "success" ] && echo "✅" || echo "❌")
          STATUS_TEXT=$([ "${{ job.status }}" == "success" ] && echo "Sucesso" || echo "Falhou")
          curl -X POST "$SLACK_WEBHOOK" -H 'Content-Type: application/json' -d "{\"text\": \"$STATUS_EMOJI Deploy STAGING $STATUS_TEXT\"}"

  # ════════════════════════════════════════════════════════════════
  # 🟢 FASE 3b: Deploy PRODUCTION (OTIMIZADO)
  # ════════════════════════════════════════════════════════════════

  deploy-production:
    name: 🟢 Deploy to Production
    needs: build-image
    runs-on: [self-hosted, production]
    timeout-minutes: 8  # Reduzido de 10 para 8
    if: github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://www.hallyuhub.com.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 📢 Notify Start
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYS }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | head -c 100)
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"🚀 Deploy PRODUCTION iniciado\", \"blocks\": [{\"type\": \"header\", \"text\": {\"type\": \"plain_text\", \"text\": \"🚀 Deploy PRODUCTION Iniciado\"}}, {\"type\": \"section\", \"fields\": [{\"type\": \"mrkdwn\", \"text\": \"*Branch:*\\n\`${{ github.ref_name }}\`\"}, {\"type\": \"mrkdwn\", \"text\": \"*Commit:*\\n\`${GITHUB_SHA:0:7}\`\"}]}, {\"type\": \"section\", \"text\": {\"type\": \"mrkdwn\", \"text\": \"*Mensagem:*\\n> $COMMIT_MSG\"}}]}"

      - name: 🏷️ Prepare Environment & Directory
        run: |
          set -e
          echo "📁 Ensuring base directory exists..."
          sudo mkdir -p /var/www/hallyuhub
          sudo chown -R github-runner:github-runner /var/www/hallyuhub

          cd /var/www/hallyuhub

          if [ ! -f .env.production ]; then
            echo "⚠️ .env.production not found! Creating..."
            [ -f .env.production.bak ] && cp .env.production.bak .env.production || touch .env.production
          fi

          cp .env.production .env.production.bak
          sed -i '/^=/d' .env.production

          update_env() {
            key=$1; val=$2
            [ -z "$val" ] && return
            grep -q "^${key}=" .env.production && sed -i "s|^${key}=.*|${key}=${val}|" .env.production || echo "${key}=${val}" >> .env.production
          }

          update_env "TMDB_API_KEY" "${{ secrets.TMDB_API_KEY }}"
          update_env "UNSPLASH_ACCESS_KEY" "${{ secrets.UNSPLASH_ACCESS_KEY }}"
          update_env "GEMINI_API_KEY" "${{ secrets.GEMINI_API_KEY }}"
          update_env "DATABASE_URL" "postgresql://hallyuhub:${{ secrets.POSTGRES_PASSWORD }}@postgres-production:5432/hallyuhub_production"
          update_env "KPOPPING_DATABASE_URL" "postgresql://hallyuhub:${{ secrets.POSTGRES_PASSWORD }}@postgres-production:5432/kpopping_db"
          update_env "OLLAMA_BASE_URL" "http://ollama-production:11434"
          update_env "OLLAMA_MODEL" "phi3:mini"
          update_env "NEXT_PUBLIC_SITE_URL" "https://www.hallyuhub.com.br"
          update_env "NEXT_PUBLIC_ADSENSE_CLIENT" "ca-pub-6015098995926392"
          update_env "GOOGLE_CLIENT_ID" "${{ secrets.GOOGLE_CLIENT_ID }}"
          update_env "GOOGLE_CLIENT_SECRET" "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          update_env "RESEND_API_KEY" "${{ secrets.RESEND_API_KEY }}"

          chmod 600 .env.production

          # Shared .env for docker-compose variable interpolation (GF_SECURITY_ADMIN_PASSWORD, POSTGRES_PASSWORD)
          touch .env
          grep -q "^GF_SECURITY_ADMIN_PASSWORD=" .env && sed -i "s|^GF_SECURITY_ADMIN_PASSWORD=.*|GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}|" .env || echo "GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}" >> .env

      - name: Copy Files to Deploy Directory
        run: |
          cp -f docker-compose.prod.yml /var/www/hallyuhub/
          cp -rf scripts /var/www/hallyuhub/
          cp -rf monitoring /var/www/hallyuhub/

      - name: 💾 Save rollback image
        id: save-rollback
        run: |
          ROLLBACK_ID=$(docker images --no-trunc --format "{{.ID}}" ghcr.io/uchidate/khub:latest 2>/dev/null | head -1)
          echo "image-id=$ROLLBACK_ID" >> $GITHUB_OUTPUT
          echo "Rollback image: ${ROLLBACK_ID:0:20}..."

      - name: Deploy to Production
        run: |
          set -e
          cd /var/www/hallyuhub

          COMPOSE_CMD=$(docker compose version >/dev/null 2>&1 && echo "docker compose" || echo "docker-compose")

          echo "🧹 Limpando imagens antigas..."
          docker images ghcr.io/uchidate/khub --format "{{.ID}} {{.CreatedAt}}" | tail -n +4 | awk '{print $1}' | xargs -r docker rmi -f 2>/dev/null || true

          echo "📥 Pulling images..."
          $COMPOSE_CMD -f docker-compose.prod.yml pull hallyuhub

          echo "🛑 Parando containers antigos..."
          $COMPOSE_CMD -f docker-compose.prod.yml down || true
          docker network rm backend-production 2>/dev/null || true

          echo "🚀 Iniciando containers..."
          $COMPOSE_CMD -f docker-compose.prod.yml up -d

          echo "⏳ Aguardando postgres aceitar conexões..."
          POSTGRES_CONTAINER=$(docker ps --format '{{.Names}}' | grep -E 'postgres.production|production.postgres' | head -1)
          if [ -n "$POSTGRES_CONTAINER" ]; then
            for i in {1..30}; do
              if docker exec "$POSTGRES_CONTAINER" pg_isready -U hallyuhub -d hallyuhub_production >/dev/null 2>&1; then
                echo "✅ Postgres ready after ${i}s"
                break
              fi
              [ $i -eq 30 ] && echo "⚠️ Postgres timeout, proceeding anyway"
              sleep 1
            done
          fi

          echo "🔐 Syncing DB user password..."
          if [ -z "$POSTGRES_CONTAINER" ]; then
            echo "⚠️ Postgres production container not found, skipping password sync"
          else
            docker exec "$POSTGRES_CONTAINER" psql -U hallyuhub -d hallyuhub_production -c \
              "ALTER USER hallyuhub PASSWORD '${{ secrets.POSTGRES_PASSWORD }}';" 2>&1 \
              && echo "✅ Password synced" \
              || echo "⚠️ Password sync failed (non-blocking)"
          fi

          # OTIMIZAÇÃO: Health check mais rápido (2s interval, 18 retries)
          echo "⏳ Aguardando container ficar healthy..."
          max_retries=18
          count=0
          until [ "$(docker inspect -f '{{.State.Health.Status}}' hallyuhub 2>/dev/null)" == "healthy" ] || [ $count -eq $max_retries ]; do
            health_status=$(docker inspect -f '{{.State.Health.Status}}' hallyuhub 2>/dev/null || echo "unknown")
            echo "Aguardando... (Status: $health_status, $((count+1))/$max_retries)"
            sleep 2
            count=$((count+1))
          done

          [ $count -eq $max_retries ] && echo "❌ Timeout" && $COMPOSE_CMD -f docker-compose.prod.yml logs hallyuhub | tail -n 50 && exit 1

          # OTIMIZAÇÃO: Skip migrations se DB já está atualizado
          echo "🔍 Checking migrations..."
          MIGRATE_STATUS=$($COMPOSE_CMD -f docker-compose.prod.yml exec -T hallyuhub npx prisma migrate status 2>&1 || echo "status_failed")

          if echo "$MIGRATE_STATUS" | grep -qi "up to date"; then
            echo "✅ No pending migrations - skipping"
          else
            echo "🔄 Applying migrations..."
            $COMPOSE_CMD -f docker-compose.prod.yml exec -T hallyuhub npx prisma migrate deploy || echo "⚠️ Migration failed (continuing)"
          fi

          chmod +x scripts/export-cron-info.sh scripts/verify-production.sh
          ./scripts/export-cron-info.sh production
          ./scripts/verify-production.sh || echo "⚠️ Verification warning"

      - name: 🔍 Health Check + Auto Rollback
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYS }}
          ROLLBACK_IMAGE: ${{ steps.save-rollback.outputs.image-id }}
        run: |
          cd /var/www/hallyuhub
          COMPOSE_CMD=$(docker compose version >/dev/null 2>&1 && echo "docker compose" || echo "docker-compose")

          max_attempts=12; attempt=0
          while [ $attempt -lt $max_attempts ]; do
            curl -sf https://www.hallyuhub.com.br/api/health > /dev/null && echo "✅ OK" && exit 0
            attempt=$((attempt + 1)); sleep 3
          done

          echo "❌ Health check falhou após ${max_attempts} tentativas"

          if [ -n "$ROLLBACK_IMAGE" ]; then
            echo "🔄 Iniciando rollback automático..."
            docker tag "$ROLLBACK_IMAGE" ghcr.io/uchidate/khub:latest
            $COMPOSE_CMD -f docker-compose.prod.yml down
            $COMPOSE_CMD -f docker-compose.prod.yml up -d
            sleep 5
            echo "✅ Rollback concluído"
            curl -s -X POST "$SLACK_WEBHOOK" -H 'Content-Type: application/json' \
              -d "{\"text\": \"🔄 *ROLLBACK AUTOMÁTICO* em PRODUCTION!\\nDeploy \`${GITHUB_SHA:0:7}\` falhou no health check — revertido para versão anterior.\"}"
          else
            curl -s -X POST "$SLACK_WEBHOOK" -H 'Content-Type: application/json' \
              -d '{"text": "❌ *Deploy PRODUCTION FALHOU!* Health check falhou e sem imagem de rollback. Intervenção manual necessária!"}'
          fi
          exit 1

      - name: 📊 Summary
        if: success()
        run: |
          echo "### ✅ Deploy PRODUCTION Concluído" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://www.hallyuhub.com.br" >> $GITHUB_STEP_SUMMARY

      - name: 📢 Notify Result
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYS }}
        run: |
          STATUS_EMOJI=$([ "${{ job.status }}" == "success" ] && echo "✅" || echo "❌")
          STATUS_TEXT=$([ "${{ job.status }}" == "success" ] && echo "Sucesso" || echo "Falhou")
          curl -X POST "$SLACK_WEBHOOK" -H 'Content-Type: application/json' -d "{\"text\": \"$STATUS_EMOJI Deploy PRODUCTION $STATUS_TEXT\"}"
