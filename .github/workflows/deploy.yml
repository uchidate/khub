# ═══════════════════════════════════════════════════════════════════
# BUILD & DEPLOY — HallyuHub (Coolify)
# ═══════════════════════════════════════════════════════════════════
# Fluxo:
#   push staging → validate → build image (GHA) → push ghcr.io:staging → trigger Coolify staging
#   push main    → validate → promote staging→latest (sem rebuild!) → trigger Coolify production
#
# A mesma imagem testada no staging vai para production — sem segundo build.
# Build acontece no GitHub Actions (máquina potente, gratuita).
# Coolify recebe o trigger, faz pull da imagem pronta e sobe o container.
# ═══════════════════════════════════════════════════════════════════

name: 🚀 Validate, Build and Deploy (Coolify)

on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch alvo (apenas staging permitido via dispatch)'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ════════════════════════════════════════════════════════════════
  # FASE 1: Validação (lint + typecheck + tests)
  # ════════════════════════════════════════════════════════════════

  validate-code:
    name: ✅ Validate Code
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: |
          npx prisma generate
          npx prisma generate --schema=prisma-kpopping/schema.prisma --config=prisma-kpopping/prisma.config.ts

      - name: 🔍 Lint & Type Check
        run: |
          echo "::group::ESLint"
          npx eslint app/ lib/ --max-warnings 10
          echo "::endgroup::"
          echo "::group::TypeScript"
          npx tsc --noEmit
          echo "::endgroup::"

      - name: 🧪 Tests
        run: npx vitest run

      - name: 🔒 Security Audit
        run: npm audit --audit-level=high || echo "::warning::Vulnerabilidades high/critical encontradas — revisar"

  # ════════════════════════════════════════════════════════════════
  # FASE 2a: Build da imagem Docker (apenas staging)
  # ════════════════════════════════════════════════════════════════

  build-image:
    name: 🐳 Build Docker Image
    needs: validate-code
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Rollback Image
        run: |
          SOURCE_TAG="ghcr.io/${{ env.IMAGE_NAME }}:staging"
          ROLLBACK_TAG="ghcr.io/${{ env.IMAGE_NAME }}:rollback-staging"
          docker pull "$SOURCE_TAG" 2>/dev/null && \
            docker tag "$SOURCE_TAG" "$ROLLBACK_TAG" && \
            docker push "$ROLLBACK_TAG" && \
            echo "✅ Rollback image saved: $ROLLBACK_TAG" || \
            echo "⚠️ No previous image to save (first deploy)"

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/uchidate/khub:staging
          cache-to: type=gha,mode=max

      - name: 📊 Summary
        run: |
          echo "### 🐳 Imagem buildada e enviada para ghcr.io" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # FASE 2b: Promote staging → production (apenas main, sem rebuild)
  # ════════════════════════════════════════════════════════════════

  promote-image:
    name: 🏷️ Promote Image to Production
    needs: validate-code
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Rollback Image
        run: |
          SOURCE_TAG="ghcr.io/${{ env.IMAGE_NAME }}:latest"
          ROLLBACK_TAG="ghcr.io/${{ env.IMAGE_NAME }}:rollback-latest"
          docker pull "$SOURCE_TAG" 2>/dev/null && \
            docker tag "$SOURCE_TAG" "$ROLLBACK_TAG" && \
            docker push "$ROLLBACK_TAG" && \
            echo "✅ Rollback image saved: $ROLLBACK_TAG" || \
            echo "⚠️ No previous image to save (first deploy)"

      - name: Promote staging → latest
        run: |
          STAGING_TAG="ghcr.io/${{ env.IMAGE_NAME }}:staging"
          LATEST_TAG="ghcr.io/${{ env.IMAGE_NAME }}:latest"
          SHA_TAG="ghcr.io/${{ env.IMAGE_NAME }}:main-${{ github.sha }}"

          echo "Pulling staging image..."
          docker pull "$STAGING_TAG" || { echo "❌ Imagem staging não encontrada — faça push para staging primeiro"; exit 1; }

          echo "Promoting $STAGING_TAG → $LATEST_TAG"
          docker tag "$STAGING_TAG" "$LATEST_TAG"
          docker tag "$STAGING_TAG" "$SHA_TAG"
          docker push "$LATEST_TAG"
          docker push "$SHA_TAG"
          echo "✅ Imagem promovida para production (sem rebuild)"

      - name: 📊 Summary
        run: |
          echo "### 🏷️ Imagem promovida staging → production" >> $GITHUB_STEP_SUMMARY
          echo "A mesma imagem testada em staging foi para production — sem rebuild." >> $GITHUB_STEP_SUMMARY
          echo "**SHA tag:** \`main-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # FASE 3a: Deploy STAGING — Coolify faz pull da imagem pronta
  # ════════════════════════════════════════════════════════════════

  deploy-staging:
    name: 🟡 Deploy to Staging (Coolify)
    needs: build-image
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: staging
      url: https://staging.hallyuhub.com.br

    steps:
      - name: 🚀 Trigger Coolify Deploy
        run: |
          UUID=$(echo "${{ vars.COOLIFY_STAGING_UUID }}" | tr -d '[:space:]')
          echo "Triggering Coolify deploy for staging (uuid: $UUID)..."
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          RESPONSE=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            root@31.97.255.107 \
            "curl -s -w '\n%{http_code}' -X GET \
              --connect-timeout 10 --max-time 60 \
              'http://localhost:8000/api/v1/deploy?uuid=${UUID}&force=false' \
              -H 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}' \
              -H 'Content-Type: application/json'")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Coolify deploy trigger failed (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "✅ Deploy triggered (HTTP $HTTP_CODE)"

      - name: 🔍 Smoke Test
        run: |
          echo "Aguardando container subir..."
          for i in $(seq 1 12); do
            sleep 10
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 https://staging.hallyuhub.com.br/api/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ Staging health check OK após $((i * 10))s"
              exit 0
            fi
            echo "⏳ Tentativa $i/12: HTTP $HTTP"
          done
          echo "❌ Staging não respondeu após 120s"
          exit 1

      - name: 📊 Summary
        run: |
          echo "### 🟡 Deploy Staging Concluído" >> $GITHUB_STEP_SUMMARY
          echo "Coolify fez pull da imagem e o container está respondendo." >> $GITHUB_STEP_SUMMARY
          echo "[Acompanhe aqui](http://31.97.255.107:8000)" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # FASE 3b: Deploy PRODUCTION — Coolify faz pull da imagem pronta
  # ════════════════════════════════════════════════════════════════

  deploy-production:
    name: 🟢 Deploy to Production (Coolify)
    needs: promote-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: production
      url: https://www.hallyuhub.com.br

    steps:
      - name: 🚀 Trigger Coolify Deploy
        run: |
          UUID=$(echo "${{ vars.COOLIFY_PRODUCTION_UUID }}" | tr -d '[:space:]')
          echo "Triggering Coolify deploy for production (uuid: $UUID)..."
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          RESPONSE=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            root@31.97.255.107 \
            "curl -s -w '\n%{http_code}' -X GET \
              --connect-timeout 10 --max-time 60 \
              'http://localhost:8000/api/v1/deploy?uuid=${UUID}&force=false' \
              -H 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}' \
              -H 'Content-Type: application/json'")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Coolify deploy trigger failed (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "✅ Deploy triggered (HTTP $HTTP_CODE)"

      - name: 🔍 Smoke Test
        run: |
          echo "Aguardando container subir..."
          for i in $(seq 1 12); do
            sleep 10
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 https://www.hallyuhub.com.br/api/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ Production health check OK após $((i * 10))s"
              exit 0
            fi
            echo "⏳ Tentativa $i/12: HTTP $HTTP"
          done
          echo "❌ Production não respondeu após 120s"
          exit 1

      - name: 🔧 Atualizar container nas Scheduled Tasks
        run: |
          # Após deploy, o container recebe um novo nome — atualizar todas as tasks
          APP_UUID="e6h2xvvpu8i2jmzcb3tpzmxo"
          CONTAINER=$(curl -s "http://31.97.255.107:8000/api/v1/applications/${APP_UUID}/containers" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" | jq -r '.[0].Names // .[0].name // empty' | head -1 | tr -d '/')
          if [ -z "$CONTAINER" ]; then
            echo "⚠️ Não foi possível detectar o container name — tasks não atualizadas"
            exit 0
          fi
          echo "Container detectado: $CONTAINER"
          SSH_CMD="docker exec coolify-db psql -U coolify coolify -c \"UPDATE scheduled_tasks SET container = '${CONTAINER}' WHERE application_id = (SELECT id FROM applications WHERE uuid = '${APP_UUID}');\""
          sshpass -p '${{ secrets.SSH_PASSWORD }}' ssh -o StrictHostKeyChecking=no root@31.97.255.107 "$SSH_CMD" 2>/dev/null \
            && echo "✅ Scheduled tasks atualizadas com container: $CONTAINER" \
            || echo "⚠️ Falha ao atualizar scheduled tasks (não crítico)"

      - name: 📊 Summary
        run: |
          echo "### 🟢 Deploy Production Concluído" >> $GITHUB_STEP_SUMMARY
          echo "Coolify fez pull da imagem e o container está respondendo." >> $GITHUB_STEP_SUMMARY
          echo "[Acompanhe aqui](http://31.97.255.107:8000)" >> $GITHUB_STEP_SUMMARY
