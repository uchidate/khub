# ═══════════════════════════════════════════════════════════════════
# BUILD & DEPLOY — HallyuHub (Coolify)
# ═══════════════════════════════════════════════════════════════════
# Fluxo:
#   push staging → validate → build image (GHA) → push ghcr.io → trigger Coolify
#   push main    → validate → build image (GHA) → push ghcr.io → trigger Coolify
#
# Build acontece no GitHub Actions (máquina potente, gratuita).
# Coolify recebe o trigger, faz pull da imagem pronta e sobe o container.
# ═══════════════════════════════════════════════════════════════════

name: 🚀 Validate, Build and Deploy (Coolify)

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ════════════════════════════════════════════════════════════════
  # FASE 1: Validação (lint + typecheck + tests)
  # ════════════════════════════════════════════════════════════════

  validate-code:
    name: ✅ Validate Code
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: |
          npx prisma generate
          npx prisma generate --schema=prisma-kpopping/schema.prisma --config=prisma-kpopping/prisma.config.ts

      - name: 🔍 Lint & Type Check
        run: |
          echo "::group::ESLint"
          npx eslint app/ lib/ --max-warnings 10
          echo "::endgroup::"
          echo "::group::TypeScript"
          npx tsc --noEmit
          echo "::endgroup::"

      - name: 🧪 Tests
        run: npx vitest run

      - name: 🔒 Security Audit
        run: npm audit --audit-level=high || echo "::warning::Vulnerabilidades high/critical encontradas — revisar"

  # ════════════════════════════════════════════════════════════════
  # FASE 2: Build da imagem Docker no GitHub Actions
  # ════════════════════════════════════════════════════════════════

  build-image:
    name: 🐳 Build Docker Image
    needs: validate-code
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
            type=sha,prefix={{branch}}-

      - name: Save Rollback Image
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            SOURCE_TAG="ghcr.io/${{ env.IMAGE_NAME }}:latest"
            ROLLBACK_TAG="ghcr.io/${{ env.IMAGE_NAME }}:rollback-latest"
          else
            SOURCE_TAG="ghcr.io/${{ env.IMAGE_NAME }}:staging"
            ROLLBACK_TAG="ghcr.io/${{ env.IMAGE_NAME }}:rollback-staging"
          fi
          docker pull "$SOURCE_TAG" 2>/dev/null && \
            docker tag "$SOURCE_TAG" "$ROLLBACK_TAG" && \
            docker push "$ROLLBACK_TAG" && \
            echo "✅ Rollback image saved: $ROLLBACK_TAG" || \
            echo "⚠️ No previous image to save (first deploy)"

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/uchidate/khub:staging,enable=${{ github.ref == 'refs/heads/staging' }}
            type=registry,ref=ghcr.io/uchidate/khub:latest,enable=${{ github.ref == 'refs/heads/main' }}
          cache-to: type=gha,mode=max

      - name: 📊 Summary
        run: |
          echo "### 🐳 Imagem buildada e enviada para ghcr.io" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # FASE 3a: Deploy STAGING — Coolify faz pull da imagem pronta
  # ════════════════════════════════════════════════════════════════

  deploy-staging:
    name: 🟡 Deploy to Staging (Coolify)
    needs: build-image
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: staging
      url: http://31.97.255.107:3001

    steps:
      - name: 🚀 Trigger Coolify Deploy
        run: |
          UUID=$(echo "${{ vars.COOLIFY_STAGING_UUID }}" | tr -d '[:space:]')
          echo "Triggering Coolify deploy for staging (uuid: $UUID)..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            "http://31.97.255.107:8000/api/v1/deploy?uuid=${UUID}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Coolify deploy trigger failed (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "✅ Deploy triggered (HTTP $HTTP_CODE)"

      - name: 🔍 Smoke Test
        run: |
          echo "Aguardando container subir..."
          for i in $(seq 1 12); do
            sleep 10
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" https://staging.hallyuhub.com.br/api/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ Staging health check OK após $((i * 10))s"
              exit 0
            fi
            echo "⏳ Tentativa $i/12: HTTP $HTTP"
          done
          echo "❌ Staging não respondeu após 120s"
          exit 1

      - name: 📊 Summary
        run: |
          echo "### 🟡 Deploy Staging Disparado" >> $GITHUB_STEP_SUMMARY
          echo "Coolify está fazendo pull da imagem e subindo o container." >> $GITHUB_STEP_SUMMARY
          echo "[Acompanhe aqui](http://31.97.255.107:8000)" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # FASE 3b: Deploy PRODUCTION — Coolify faz pull da imagem pronta
  # ════════════════════════════════════════════════════════════════

  deploy-production:
    name: 🟢 Deploy to Production (Coolify)
    needs: build-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: production
      url: https://www.hallyuhub.com.br

    steps:
      - name: 🚀 Trigger Coolify Deploy
        run: |
          UUID=$(echo "${{ vars.COOLIFY_PRODUCTION_UUID }}" | tr -d '[:space:]')
          echo "Triggering Coolify deploy for production (uuid: $UUID)..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            "http://31.97.255.107:8000/api/v1/deploy?uuid=${UUID}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Coolify deploy trigger failed (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "✅ Deploy triggered (HTTP $HTTP_CODE)"

      - name: 🔍 Smoke Test
        run: |
          echo "Aguardando container subir..."
          for i in $(seq 1 12); do
            sleep 10
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" https://www.hallyuhub.com.br/api/health 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ Production health check OK após $((i * 10))s"
              exit 0
            fi
            echo "⏳ Tentativa $i/12: HTTP $HTTP"
          done
          echo "❌ Production não respondeu após 120s"
          exit 1

      - name: 📊 Summary
        run: |
          echo "### 🟢 Deploy Production Disparado" >> $GITHUB_STEP_SUMMARY
          echo "Coolify está fazendo pull da imagem e subindo o container." >> $GITHUB_STEP_SUMMARY
          echo "[Acompanhe aqui](http://31.97.255.107:8000)" >> $GITHUB_STEP_SUMMARY
