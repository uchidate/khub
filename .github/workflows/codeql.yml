name: CodeQL Analysis

# ============================================================
# Análise estática de segurança (SAST) via GitHub CodeQL.
# Detecta vulnerabilidades em JavaScript/TypeScript:
#   - Injeção de código, XSS, path traversal, log injection, etc.
#
# Como funciona em PRs (duas checks aparecem no PR):
#   ① "CodeQL Analysis / Analyze" → sempre passa (só faz upload)
#   ② "Code scanning results / CodeQL" → BLOQUEIA o PR se o código
#      do PR introduzir alertas novos de severidade HIGH ou CRITICAL
#
# ⚠️  Se o PR estiver bloqueado mas o job "Analyze" estiver verde:
#   → Vá em Security → Code scanning → filtre pela branch do PR
#   → Corrija os alertas listados como "New" ou "Introduced"
#   → Falsos-positivos: marque como "Dismissed" na aba Security
#
# Para ver todos os alertas: GitHub → Security → Code scanning
# ============================================================

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # Toda segunda-feira 00:00 UTC

jobs:
  analyze:
    name: Analyze (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # security-and-quality: queries padrão de segurança + qualidade
          # (mais focado que security-extended, menos falsos-positivos)
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript
