name: CodeQL Analysis

# ============================================================
# Análise estática de segurança (SAST) via GitHub CodeQL.
# Detecta vulnerabilidades comuns em JavaScript/TypeScript:
# - Injeção de código, XSS, path traversal, etc.
#
# Resultados aparecem em: GitHub → Security → Code scanning
# ============================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # Toda segunda-feira 00:00 UTC

jobs:
  analyze:
    name: Analyze (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Queries extras de segurança além das padrões
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
