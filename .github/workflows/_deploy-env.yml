# ═══════════════════════════════════════════════════════════════════
# DEPLOY ENVIRONMENT — Reusable Workflow
# ═══════════════════════════════════════════════════════════════════
# Chamado por deploy.yml para staging e production.
# Uma única fonte de verdade — paridade garantida por design.
# ═══════════════════════════════════════════════════════════════════

name: 🔄 Deploy Environment

on:
  workflow_call:
    inputs:
      # ── Identificação ──────────────────────────────────────────
      environment:
        description: 'staging | production'
        type: string
        required: true
      deploy_label:
        description: 'STAGING | PRODUCTION (para mensagens)'
        type: string
        required: true
      label_emoji:
        description: '🟡 | 🟢'
        type: string
        required: true
      runner:
        description: 'JSON array de runner labels, ex: ["self-hosted","staging"]'
        type: string
        required: true
      environment_url:
        description: 'URL do ambiente para GitHub Actions'
        type: string
        required: true

      # ── Arquivos e configurações ───────────────────────────────
      env_file:
        description: '.env.staging | .env.production'
        type: string
        required: true
      compose_file:
        description: 'docker-compose.staging.yml | docker-compose.prod.yml'
        type: string
        required: true
      nginx_conf:
        description: 'Caminho do arquivo de configuração nginx'
        type: string
        required: true
      nginx_site:
        description: 'hallyuhub-staging | hallyuhub'
        type: string
        required: true

      # ── Docker ────────────────────────────────────────────────
      container_name:
        description: 'Nome do container da app: hallyuhub-staging | hallyuhub'
        type: string
        required: true
      migrate_name:
        description: 'Nome do container de migrate: migrate-staging | migrate-production'
        type: string
        required: true
      image_tag:
        description: 'Tag da imagem Docker: staging | latest'
        type: string
        required: true

      # ── URLs ──────────────────────────────────────────────────
      health_url:
        description: 'URL completa para health check'
        type: string
        required: true
      base_url:
        description: 'URL base para cache warm-up'
        type: string
        required: true
      site_url:
        description: 'Valor de NEXT_PUBLIC_SITE_URL'
        type: string
        required: true

      # ── Banco de Dados ────────────────────────────────────────
      db_host:
        description: 'postgres-staging | postgres-production'
        type: string
        required: true
      db_name:
        description: 'hallyuhub_staging | hallyuhub_production'
        type: string
        required: true
      connection_limit:
        description: 'connection_limit da DATABASE_URL: 8 | 10'
        type: string
        required: true
      pg_grep_pattern:
        description: 'Grep pattern para encontrar container postgres'
        type: string
        required: true

      # ── Ollama ────────────────────────────────────────────────
      ollama_host:
        description: 'ollama-staging | ollama-production'
        type: string
        required: true
      ollama_model:
        description: 'gemma:2b | phi3:mini'
        type: string
        required: true

      # ── Pós-deploy ────────────────────────────────────────────
      post_deploy_command:
        description: 'Comando completo a executar após deploy (pode incluir env vars)'
        type: string
        required: true

      # ── Slack ─────────────────────────────────────────────────
      suppress_slack_on_success:
        description: 'Suprimir notificação Slack em sucesso (staging=true, production=false)'
        type: boolean
        required: true

jobs:
  deploy:
    name: ${{ inputs.label_emoji }} Deploy to ${{ inputs.deploy_label }}
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 8

    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 📢 Notify Start
        if: ${{ !inputs.suppress_slack_on_success }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYS }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | head -c 100)
          curl -s -X POST "$SLACK_WEBHOOK" -H 'Content-Type: application/json' \
            -d "{\"text\": \"🚀 Deploy ${{ inputs.deploy_label }} iniciado\", \"blocks\": [{\"type\": \"header\", \"text\": {\"type\": \"plain_text\", \"text\": \"🚀 Deploy ${{ inputs.deploy_label }} Iniciado\"}}, {\"type\": \"section\", \"fields\": [{\"type\": \"mrkdwn\", \"text\": \"*Branch:*\n\`${{ github.ref_name }}\`\"}, {\"type\": \"mrkdwn\", \"text\": \"*Commit:*\n\`${GITHUB_SHA:0:7}\`\"}]}, {\"type\": \"section\", \"text\": {\"type\": \"mrkdwn\", \"text\": \"*Mensagem:*\n> $COMMIT_MSG\"}}]}"

      - name: 🏷️ Prepare Environment
        run: |
          set -e
          sudo mkdir -p /var/www/hallyuhub
          sudo chown -R github-runner:github-runner /var/www/hallyuhub
          cd /var/www/hallyuhub

          ENV_FILE="${{ inputs.env_file }}"
          [ ! -f "$ENV_FILE" ] && { [ -f "${ENV_FILE}.bak" ] && cp "${ENV_FILE}.bak" "$ENV_FILE" || touch "$ENV_FILE"; }
          cp "$ENV_FILE" "${ENV_FILE}.bak"
          sed -i '/^=/d' "$ENV_FILE"

          update_env() {
            local key=$1 val=$2
            [ -z "$val" ] && return
            grep -q "^${key}=" "$ENV_FILE" \
              && sed -i "s|^${key}=.*|${key}=${val}|" "$ENV_FILE" \
              || echo "${key}=${val}" >> "$ENV_FILE"
          }

          update_env "TMDB_API_KEY"              "${{ secrets.TMDB_API_KEY }}"
          update_env "UNSPLASH_ACCESS_KEY"        "${{ secrets.UNSPLASH_ACCESS_KEY }}"
          update_env "GEMINI_API_KEY"             "${{ secrets.GEMINI_API_KEY }}"
          update_env "DATABASE_URL"               "postgresql://hallyuhub:${{ secrets.POSTGRES_PASSWORD }}@${{ inputs.db_host }}:5432/${{ inputs.db_name }}?connection_limit=${{ inputs.connection_limit }}&pool_timeout=30"
          update_env "KPOPPING_DATABASE_URL"      "postgresql://hallyuhub:${{ secrets.POSTGRES_PASSWORD }}@postgres-production:5432/kpopping_db"
          update_env "OLLAMA_BASE_URL"            "http://${{ inputs.ollama_host }}:11434"
          update_env "OLLAMA_MODEL"               "${{ inputs.ollama_model }}"
          update_env "NEXT_PUBLIC_SITE_URL"       "${{ inputs.site_url }}"
          update_env "NEXT_PUBLIC_ADSENSE_CLIENT"          "ca-pub-6015098995926392"
          update_env "NEXT_PUBLIC_BING_SITE_VERIFICATION" "${{ vars.NEXT_PUBLIC_BING_SITE_VERIFICATION }}"
          update_env "GOOGLE_CLIENT_ID"           "${{ secrets.GOOGLE_CLIENT_ID }}"
          update_env "GOOGLE_CLIENT_SECRET"       "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          update_env "RESEND_API_KEY"             "${{ secrets.RESEND_API_KEY }}"
          chmod 600 "$ENV_FILE"

          touch .env
          grep -q "^GF_SECURITY_ADMIN_PASSWORD=" .env \
            && sed -i "s|^GF_SECURITY_ADMIN_PASSWORD=.*|GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}|" .env \
            || echo "GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}" >> .env

      - name: Copy Files to Deploy Directory
        run: |
          cp -f ${{ inputs.compose_file }} /var/www/hallyuhub/
          cp -rf scripts /var/www/hallyuhub/
          cp -rf monitoring /var/www/hallyuhub/

      - name: 🔧 Sync Nginx Config + Install Watchdog
        run: |
          set -e
          sudo cp "${{ inputs.nginx_conf }}" /etc/nginx/sites-available/"${{ inputs.nginx_site }}"
          sudo mkdir -p /etc/nginx/html && sudo cp docker/nginx/maintenance.html /etc/nginx/html/maintenance.html
          [ ! -L /etc/nginx/sites-enabled/"${{ inputs.nginx_site }}" ] \
            && sudo ln -sf /etc/nginx/sites-available/"${{ inputs.nginx_site }}" \
               /etc/nginx/sites-enabled/"${{ inputs.nginx_site }}" 2>/dev/null || true
          # Tuning do nginx.conf para alta concorrência (10k conexões)
          sudo sed -i 's/worker_connections [0-9]*/worker_connections 4096/' /etc/nginx/nginx.conf
          grep -q 'worker_rlimit_nofile' /etc/nginx/nginx.conf || \
            sudo sed -i '/^worker_processes/a worker_rlimit_nofile 65536;' /etc/nginx/nginx.conf
          grep -q 'multi_accept' /etc/nginx/nginx.conf || \
            sudo sed -i '/worker_connections/a \    multi_accept on;' /etc/nginx/nginx.conf
          # System tuning — aumenta backlog de conexões TCP
          sudo sysctl -w net.core.somaxconn=65535 net.ipv4.tcp_max_syn_backlog=8192 >/dev/null 2>&1 || true
          printf 'net.core.somaxconn=65535\nnet.ipv4.tcp_max_syn_backlog=8192\n' | \
            sudo tee /etc/sysctl.d/99-hallyuhub.conf >/dev/null
          sudo nginx -t && sudo systemctl reload nginx && echo "✅ Nginx recarregado (worker_connections=4096)"
          chmod +x /var/www/hallyuhub/scripts/watchdog.sh
          # Watchdog via /etc/cron.d/ (persiste entre runs de fix-crontab.sh)
          printf 'SHELL=/bin/bash\nPATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin\n* * * * * root /var/www/hallyuhub/scripts/watchdog.sh >> /var/log/watchdog.log 2>&1\n' \
            | sudo tee /etc/cron.d/hallyuhub-watchdog > /dev/null
          echo "✅ Watchdog instalado em /etc/cron.d/hallyuhub-watchdog"
          # Remover entrada legada do crontab root (se existir)
          CURRENT_CRONTAB=$(crontab -l 2>/dev/null || true)
          if echo "$CURRENT_CRONTAB" | grep -q "watchdog.sh"; then
            echo "$CURRENT_CRONTAB" | grep -v "watchdog.sh" | crontab -
            echo "✅ Entrada legada do watchdog removida do crontab"
          fi
          # Desativar AI auto-generation (causava OOM por acúmulo de processos)
          sudo rm -f /etc/cron.d/hallyuhub-ai && echo "✅ hallyuhub-ai cron desativado" || true

      - name: 💾 Save rollback image
        id: save-rollback
        run: |
          ROLLBACK_ID=$(docker images --no-trunc --format "{{.ID}}" ghcr.io/uchidate/khub:${{ inputs.image_tag }} 2>/dev/null | head -1)
          echo "image-id=$ROLLBACK_ID" >> $GITHUB_OUTPUT
          echo "Rollback image: ${ROLLBACK_ID:0:20}..."

      - name: 🚀 Deploy
        run: |
          set -e
          cd /var/www/hallyuhub
          COMPOSE="docker compose -f ${{ inputs.compose_file }}"

          echo "🧹 Limpando imagens antigas..."
          docker images ghcr.io/uchidate/khub --format "{{.ID}} {{.CreatedAt}}" | tail -n +4 | awk '{print $1}' | xargs -r docker rmi -f 2>/dev/null || true

          echo "📥 Pulling app image..."
          $COMPOSE pull ${{ inputs.container_name }}

          echo "✅ Garantindo infraestrutura (postgres, ollama)..."
          $COMPOSE up -d ${{ inputs.db_host }} ${{ inputs.ollama_host }} 2>/dev/null || true

          echo "🔐 Syncing DB password..."
          PGCTR=$(docker ps --format '{{.Names}}' | grep -E '${{ inputs.pg_grep_pattern }}' | head -1)
          [ -n "$PGCTR" ] && docker exec "$PGCTR" psql -U hallyuhub -d ${{ inputs.db_name }} \
            -c "ALTER USER hallyuhub PASSWORD '${{ secrets.POSTGRES_PASSWORD }}';" 2>&1 \
            && echo "✅ Password synced" || echo "⚠️ Password sync failed (non-blocking)"

          echo "🛑 Parando apenas o app..."
          $COMPOSE stop ${{ inputs.container_name }} 2>/dev/null || true
          $COMPOSE rm -f ${{ inputs.container_name }} ${{ inputs.migrate_name }} 2>/dev/null || true

          echo "🚀 Iniciando app + migration..."
          $COMPOSE up -d ${{ inputs.container_name }}

          echo "⏳ Aguardando container ficar healthy..."
          max=18; n=0
          until [ "$(docker inspect -f '{{.State.Health.Status}}' ${{ inputs.container_name }} 2>/dev/null)" = "healthy" ] \
             || [ $n -eq $max ]; do
            echo "  $(docker inspect -f '{{.State.Health.Status}}' ${{ inputs.container_name }} 2>/dev/null || echo unknown) ($((n+1))/$max)"
            sleep 2; n=$((n+1))
          done
          [ $n -eq $max ] && echo "❌ Timeout" \
            && $COMPOSE logs ${{ inputs.container_name }} | tail -50 && exit 1

          chmod +x scripts/export-cron-info.sh
          ./scripts/export-cron-info.sh ${{ inputs.environment }}
          bash -c "${{ inputs.post_deploy_command }}" || echo "⚠️ Verification warning (non-blocking)"

      - name: 🔍 Health Check + Auto Rollback
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYS }}
          ROLLBACK_IMAGE: ${{ steps.save-rollback.outputs.image-id }}
        run: |
          cd /var/www/hallyuhub
          COMPOSE="docker compose -f ${{ inputs.compose_file }}"

          for i in $(seq 1 12); do
            curl -sf "${{ inputs.health_url }}" > /dev/null && echo "✅ OK" && exit 0
            sleep 3
          done

          echo "❌ Health check falhou"

          if [ -n "$ROLLBACK_IMAGE" ]; then
            echo "🔄 Rollback automático..."
            docker tag "$ROLLBACK_IMAGE" ghcr.io/uchidate/khub:${{ inputs.image_tag }}
            $COMPOSE stop ${{ inputs.container_name }} 2>/dev/null || true
            $COMPOSE rm -f ${{ inputs.container_name }} ${{ inputs.migrate_name }} 2>/dev/null || true
            $COMPOSE up -d ${{ inputs.container_name }}
            sleep 5
            echo "✅ Rollback concluído"
            curl -s -X POST "$SLACK_WEBHOOK" -H 'Content-Type: application/json' \
              -d "{\"text\": \"🔄 *ROLLBACK AUTOMÁTICO* em ${{ inputs.deploy_label }}!\nDeploy \`${GITHUB_SHA:0:7}\` falhou — revertido para versão anterior.\"}"
          else
            curl -s -X POST "$SLACK_WEBHOOK" -H 'Content-Type: application/json' \
              -d "{\"text\": \"❌ *Deploy ${{ inputs.deploy_label }} FALHOU!* Sem imagem de rollback. Intervenção manual necessária!\"}"
          fi
          exit 1

      - name: 🔥 Cache Warm-up (ISR)
        if: success()
        run: |
          BASE="${{ inputs.base_url }}"
          for page in /groups /artists /news; do
            curl -sf --max-time 15 "${BASE}${page}" -o /dev/null && echo "✅ ${page}" || echo "⚠️ ${page}"
          done
          sleep 5
          for page in /groups /artists /news; do
            curl -sf --max-time 15 "${BASE}${page}" -o /dev/null && echo "✅ ${page} regenerado" || echo "⚠️ ${page}"
          done

      - name: 📊 Summary
        if: success()
        run: echo "### ✅ Deploy ${{ inputs.deploy_label }} Concluído — ${{ inputs.environment_url }}" >> $GITHUB_STEP_SUMMARY

      - name: 📢 Notify Result
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_DEPLOYS }}
        run: |
          if [ "${{ job.status }}" = "success" ] && ${{ inputs.suppress_slack_on_success }}; then
            echo "Sucesso em ${{ inputs.deploy_label }} — notificação suprimida"
            exit 0
          fi
          STATUS_EMOJI=$([ "${{ job.status }}" = "success" ] && echo "✅" || echo "❌")
          curl -s -X POST "$SLACK_WEBHOOK" -H 'Content-Type: application/json' \
            -d "{\"text\": \"$STATUS_EMOJI Deploy ${{ inputs.deploy_label }} ${{ job.status }}\"}"
