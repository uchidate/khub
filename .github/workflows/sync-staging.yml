# ═══════════════════════════════════════════════════════════════════
# SYNC STAGING ← PRODUCTION
# ═══════════════════════════════════════════════════════════════════
# Copia o banco de production para staging, sanitizando dados
# sensíveis (senhas de usuários substituídas por hash placeholder).
#
# Acionado manualmente ou toda segunda-feira às 6h UTC.
# Garante que staging tenha dados reais para testar.
# ═══════════════════════════════════════════════════════════════════

name: 🔄 Sync Staging ← Production

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # toda segunda-feira às 6h UTC

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    name: 🔄 Sync Staging DB from Production
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: staging
      url: https://staging.hallyuhub.com.br

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ssh
        with:
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📤 Upload sync script
        run: |
          cat > /tmp/sync-script.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          LOG="/tmp/sync_run.log"
          exec > "$LOG" 2>&1

          DUMP_FILE="/tmp/prod_sync_$(date +%Y%m%d_%H%M%S).dump"

          echo "Descobrindo containers postgres..."
          PROD_PG=""
          STAGING_PG=""
          while IFS= read -r name; do
            if docker exec "$name" psql -U hallyuhub -lqt 2>/dev/null | grep -q "hallyuhub_production"; then
              PROD_PG="$name"
            elif docker exec "$name" psql -U hallyuhub -lqt 2>/dev/null | grep -q "hallyuhub_staging"; then
              STAGING_PG="$name"
            fi
          done < <(docker ps --format "{{.Names}}")

          [ -n "$PROD_PG" ]    || { echo "❌ Container postgres production não encontrado"; exit 1; }
          [ -n "$STAGING_PG" ] || { echo "❌ Container postgres staging não encontrado"; exit 1; }
          echo "  Production postgres: $PROD_PG"
          echo "  Staging postgres:    $STAGING_PG"

          echo "[1/4] Gerando dump de production..."
          docker exec "$PROD_PG" pg_dump \
            -U hallyuhub -Fc --no-acl --no-owner hallyuhub_production \
            > "$DUMP_FILE"
          echo "      Dump: $(du -sh $DUMP_FILE | cut -f1)"

          echo "[2/4] Recriando banco staging..."
          docker exec "$STAGING_PG" psql -U postgres -d postgres \
            -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='hallyuhub_staging' AND pid <> pg_backend_pid();" \
            > /dev/null 2>&1 || true
          docker exec "$STAGING_PG" psql -U postgres -d postgres \
            -c "DROP DATABASE IF EXISTS hallyuhub_staging;" > /dev/null
          docker exec "$STAGING_PG" psql -U postgres -d postgres \
            -c "CREATE DATABASE hallyuhub_staging OWNER hallyuhub;" > /dev/null

          echo "[3/4] Restaurando dump em staging..."
          docker cp "$DUMP_FILE" "$STAGING_PG":/tmp/restore.dump
          docker exec "$STAGING_PG" pg_restore \
            -U hallyuhub -d hallyuhub_staging \
            --no-acl --no-owner --no-privileges \
            -j 2 /tmp/restore.dump 2>/dev/null || true
          docker exec "$STAGING_PG" rm -f /tmp/restore.dump

          echo "[4/4] Sanitizando dados sensíveis..."
          docker exec "$STAGING_PG" psql -U hallyuhub -d hallyuhub_staging -c "
            UPDATE \"User\"
            SET password = '\$2b\$10\$staging.placeholder.hash.XXXXXXXXXXXXXXXXXXXXXXXXXX'
            WHERE password IS NOT NULL AND password != '';
          " > /dev/null 2>&1 || true

          rm -f "$DUMP_FILE"
          echo "✅ Sync concluído — staging atualizado com dados de production (sanitizados)"
          SCRIPT
          scp -i ~/.ssh/id_rsa /tmp/sync-script.sh root@31.97.255.107:/tmp/sync-script.sh

      - name: 🔄 Run sync on server (fire & poll)
        run: |
          # Executa em background no servidor — sem SSH de longa duração
          ssh -i ~/.ssh/id_rsa root@31.97.255.107 \
            "chmod +x /tmp/sync-script.sh && nohup bash /tmp/sync-script.sh &"

          # Aguarda conclusão: poll do log a cada 10s por até 10 min
          echo "Aguardando sync concluir no servidor..."
          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(ssh -i ~/.ssh/id_rsa root@31.97.255.107 \
              "tail -1 /tmp/sync_run.log 2>/dev/null || echo 'running...'" 2>/dev/null || echo 'ssh error')
            echo "[$i/60] $STATUS"
            if echo "$STATUS" | grep -q "✅ Sync concluído"; then
              echo "Sync completo!"
              ssh -i ~/.ssh/id_rsa root@31.97.255.107 "cat /tmp/sync_run.log"
              exit 0
            fi
            if echo "$STATUS" | grep -q "❌"; then
              echo "Sync falhou:"
              ssh -i ~/.ssh/id_rsa root@31.97.255.107 "cat /tmp/sync_run.log"
              exit 1
            fi
          done
          echo "❌ Timeout após 10 min"
          ssh -i ~/.ssh/id_rsa root@31.97.255.107 "cat /tmp/sync_run.log 2>/dev/null"
          exit 1

      - name: 📊 Summary
        if: always()
        run: |
          echo "### 🔄 Sync Staging ← Production" >> $GITHUB_STEP_SUMMARY
          echo "Banco de staging atualizado com dados reais de production." >> $GITHUB_STEP_SUMMARY
          echo "Senhas de usuários substituídas por placeholder." >> $GITHUB_STEP_SUMMARY
