services:
  postgres-production:
    image: postgres:16-alpine
    container_name: hallyuhub-postgres-production
    environment:
      POSTGRES_USER: hallyuhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hallyuhub_production
      TZ: America/Sao_Paulo
    volumes:
      - postgres-production-data:/var/lib/postgresql/data
    networks:
      - web
      - backend-production
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'  # Aumentado de 0.2 — banco precisa de CPU para executar queries
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hallyuhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-production:
    image: ollama/ollama:latest
    container_name: hallyuhub-ollama-production
    environment:
      TZ: America/Sao_Paulo
    volumes:
      - ollama-production-data:/root/.ollama
    networks:
      - web
      - backend-production
    restart: "no"  # Não inicia automaticamente — use DeepSeek/OpenAI como provider principal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G  # Reduzido — sem modelo ativo carregado
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  migrate-production:
    image: ghcr.io/uchidate/khub:latest
    container_name: hallyuhub-migrate-production
    # Sempre sai com 0: se migration falhar por razão não-crítica (ex: índice já existe),
    # o app sobe normalmente com o schema existente. Erros ficam nos logs do container.
    command: ["sh", "-c", "npx prisma migrate deploy || (echo '⚠️ Migration failed - proceeding with existing schema' && exit 0)"]
    env_file:
      - .env.production
    networks:
      - backend-production
    restart: "no"
    depends_on:
      postgres-production:
        condition: service_healthy

  hallyuhub:
    image: ghcr.io/uchidate/khub:latest
    container_name: hallyuhub
    ports:
      - "3000:3000"
    environment:
      - DEPLOY_ENV=production
      - TZ=America/Sao_Paulo
      # Ollama: desabilitado — setar OLLAMA_ENABLED=true para reativar (OLLAMA_BASE_URL preservado no .env.production)
      - OLLAMA_MODEL=phi3:mini
      - OLLAMA_ENABLED=false
      # Limitar heap do Node.js — GC agressivo antes do limite Docker, evita OOM kill
      - NODE_OPTIONS=--max-old-space-size=5120
    env_file:
      - .env.production
    volumes:
      - hallyuhub-data:/app/data
      - instagram-images-production:/app/public/instagram
      - /var/log/nginx:/app/nginx-logs:ro
    networks:
      - web
      - backend-production
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 6G   # Aumentado de 3G — memória liberada do Ollama redistribuída ao app
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      migrate-production:
        condition: service_completed_successfully
      postgres-production:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: hallyuhub-prometheus-production
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-production-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - backend-production
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    depends_on:
      - hallyuhub

  grafana:
    image: grafana/grafana:latest
    container_name: hallyuhub-grafana-production
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://31.97.255.107:3002
      - GF_DB_HOST=postgres-production:5432
      - GF_DB_NAME=hallyuhub_production
      - GF_DB_USER=hallyuhub
      - GF_DB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - grafana-production-data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - web
      - backend-production
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
    depends_on:
      - postgres-production
      - prometheus

networks:
  web:
    external: true
  backend-production:
    driver: bridge

volumes:
  hallyuhub-data:
    external: true
  postgres-production-data:
    external: true
  ollama-production-data:
    external: true
  instagram-images-production:
  prometheus-production-data:
  grafana-production-data:
