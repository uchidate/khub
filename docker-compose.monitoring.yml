# ╔════════════════════════════════════════════════════════════════╗
# ║  MONITORING STACK - Prometheus + Grafana                       ║
# ║                                                                ║
# ║  Uso:                                                          ║
# ║    docker-compose -f docker-compose.monitoring.yml up -d       ║
# ║                                                                ║
# ║  Acessos:                                                      ║
# ║    Prometheus: http://localhost:9090                           ║
# ║    Grafana:    http://localhost:3002 (admin/admin)             ║
# ╚════════════════════════════════════════════════════════════════╝

services:
  # ============================================
  # Prometheus - Coleta de Metricas
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: hallyuhub-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - ./docker/monitoring/prometheus/secrets:/etc/prometheus/secrets:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - monitoring
      - web
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Alertmanager - Roteamento de Alertas
  # ============================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: hallyuhub-alertmanager
    restart: unless-stopped
    env_file:
      - .env.monitoring
    volumes:
      - ./docker/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--log.level=info'
    ports:
      - "9093:9093"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Grafana - Visualizacao
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: hallyuhub-grafana
    restart: unless-stopped
    env_file:
      - .env.monitoring
    environment:
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://31.97.255.107:3002
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3002:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Node Exporter - Metricas do Sistema
  # ============================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: hallyuhub-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - monitoring

  # ============================================
  # cAdvisor - Metricas de Containers
  # ============================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: hallyuhub-cadvisor
    restart: unless-stopped
    privileged: true
    command:
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
      - '--disable_metrics=disk,diskIO,network,tcp,udp,percpu,sched,process'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring

  # ============================================
  # Blackbox Exporter - Health checks externos
  # ============================================
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: hallyuhub-blackbox
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    ports:
      - "9115:9115"
    networks:
      - monitoring

  # ============================================
  # Umami - Analytics Self-hosted
  # ============================================
  postgres-umami:
    image: postgres:15-alpine
    container_name: hallyuhub-postgres-umami
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami_secret_change_me}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: hallyuhub-umami
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami_secret_change_me}@postgres-umami:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET:-change_me_to_random_secret_32chars}
    ports:
      - "3003:3000"
    networks:
      - monitoring
      - web
    depends_on:
      postgres-umami:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  prometheus-data:
  grafana-data:
  umami-db-data:

networks:
  monitoring:
    driver: bridge
  web:
    external: true
