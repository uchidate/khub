services:
  postgres-staging:
    image: postgres:16-alpine
    container_name: hallyuhub-postgres-staging
    environment:
      POSTGRES_USER: hallyuhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hallyuhub_staging
      TZ: America/Sao_Paulo
    volumes:
      - postgres-staging-data:/var/lib/postgresql/data
    networks:
      - web
      - backend-staging
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hallyuhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-staging:
    image: ollama/ollama:latest
    container_name: hallyuhub-ollama-staging
    environment:
      TZ: America/Sao_Paulo
    volumes:
      - ollama-staging-data:/root/.ollama
    networks:
      - web
      - backend-staging
    restart: "no"  # Não inicia automaticamente — use DeepSeek/OpenAI como provider principal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G  # Reduzido — sem modelo ativo carregado
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  migrate-staging:
    image: ghcr.io/uchidate/khub:staging
    container_name: hallyuhub-migrate-staging
    # Sempre sai com 0: se migration falhar por razão não-crítica (ex: índice já existe),
    # o app sobe normalmente com o schema existente. Erros ficam nos logs do container.
    command: ["sh", "-c", "npx prisma migrate deploy || (echo '⚠️ Migration failed - proceeding with existing schema' && exit 0)"]
    env_file:
      - .env.staging
    networks:
      - backend-staging
    restart: "no"
    depends_on:
      postgres-staging:
        condition: service_healthy

  hallyuhub-staging:
    image: ghcr.io/uchidate/khub:staging
    container_name: hallyuhub-staging
    ports:
      - "3001:3000"
    environment:
      - DEPLOY_ENV=staging
      - TZ=America/Sao_Paulo
      # Ollama: desabilitado — setar OLLAMA_ENABLED=true para reativar (OLLAMA_BASE_URL preservado no .env.staging)
      - OLLAMA_MODEL=phi3:mini
      - OLLAMA_ENABLED=false
      # Limitar heap do Node.js — GC agressivo antes do limite Docker, evita OOM
      - NODE_OPTIONS=--max-old-space-size=2048
    env_file:
      - .env.staging
    volumes:
      - hallyuhub-data:/app/data
      - instagram-images-staging:/app/public/instagram
      - /var/log/nginx:/app/nginx-logs:ro
    networks:
      - web
      - backend-staging
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.7'
          memory: 3G   # Aumentado de 2G — memória liberada do Ollama
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 60s
      timeout: 10s
      retries: 2
    depends_on:
      migrate-staging:
        condition: service_completed_successfully
      postgres-staging:
        condition: service_healthy

  prometheus-staging:
    image: prom/prometheus:latest
    container_name: hallyuhub-prometheus-staging
    volumes:
      - ./monitoring/prometheus.staging.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-staging-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - backend-staging
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    depends_on:
      - hallyuhub-staging

  grafana-staging:
    image: grafana/grafana:latest
    container_name: hallyuhub-grafana-staging
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://31.97.255.107:3003
      - GF_DB_HOST=postgres-staging:5432
      - GF_DB_NAME=hallyuhub_staging
      - GF_DB_USER=hallyuhub
      - GF_DB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - grafana-staging-data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - web
      - backend-staging
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
    depends_on:
      - postgres-staging
      - prometheus-staging

networks:
  web:
    external: true
  backend-staging:
    driver: bridge

volumes:
  hallyuhub-data:
    external: true
  postgres-staging-data:
    external: true
  ollama-staging-data:
    external: true
  instagram-images-staging:
  prometheus-staging-data:
  grafana-staging-data:
