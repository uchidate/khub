apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: false

  - name: PostgreSQL
    type: postgres
    uid: postgres
    url: ${GF_DB_HOST}
    database: ${GF_DB_NAME}
    user: ${GF_DB_USER}
    secureJsonData:
      password: ${GF_DB_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    editable: false
